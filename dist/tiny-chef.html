<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tiny Chef Arcade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            touch-action: none;
            font-family: 'Press Start 2P', monospace;
            -webkit-user-select: none;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            background: #2c1e16; /* Dark wood */
            box-shadow: 0 0 30px rgba(255, 150, 50, 0.15);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .scanlines {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.25) 50%,
                rgba(0,0,0,0.25)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        .crt-flicker {
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.95; }
            50% { opacity: 1; }
            100% { opacity: 0.95; }
        }

        .text-glow {
            text-shadow: 2px 2px 0px #d35400, -1px -1px 0px #f1c40f;
        }
        
        .alert-glow {
            text-shadow: 3px 3px 0px #c0392b, -2px -2px 0px #e74c3c;
            animation: pulse-red 0.5s infinite alternate;
        }

        @keyframes pulse-red {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
        
        .success-glow {
            text-shadow: 2px 2px 0px #27ae60, -1px -1px 0px #2ecc71;
        }

        .star { color: #555; font-size: 16px; text-shadow: 1px 1px 0 #000; transition: all 0.3s; }
        .star.earned { color: #f1c40f; text-shadow: 1px 1px 0 #d35400; animation: pop 0.3s ease-out; }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); }
            100% { transform: scale(1); }
        }

        /* Swipe surface overlay */
        #swipe-surface {
            position: absolute;
            inset: 0;
            z-index: 10;
            cursor: crosshair;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="game-container" class="crt-flicker">
        <canvas id="gameCanvas"></canvas>
        <div class="scanlines"></div>
        <div id="swipe-surface"></div>

        <!-- HUD -->
        <div id="hud" class="absolute top-0 left-0 w-full p-4 flex justify-between items-start z-20 text-white text-[10px] sm:text-xs tracking-wider pointer-events-none">
            <button id="hud-exit-btn" class="absolute top-2 left-2 bg-red-500/80 hover:bg-red-600 text-white rounded-full w-8 h-8 flex items-center justify-center pointer-events-auto border-2 border-white font-bold z-[30] pb-1">&times;</button>
            <div class="flex flex-col gap-2 relative ml-10">
                <div>SCORE: <span id="score-display" class="text-green-400">0</span></div>
                <div id="timer-container" class="text-white bg-black/60 px-2 py-1.5 flex items-center gap-1 rounded mt-1 border border-red-500/50 pointer-events-auto">
                    <svg class="w-3 h-3 text-red-500 animate-pulse shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    <span id="time-display" class="text-red-400 font-bold tracking-widest text-[12px]">60.0</span><span class="text-[8px] text-zinc-400 ml-0.5">S</span>
                </div>
            </div>
            <div class="text-right flex flex-col gap-2 relative pointer-events-none items-end">
                <div id="star-container" class="flex gap-1 justify-end mb-1">
                    <span id="star-1" class="star">★</span>
                    <span id="star-2" class="star">★</span>
                    <span id="star-3" class="star">★</span>
                </div>
                <div class="mt-2 text-right pointer-events-none">CUTS LEFT:<br><span id="cuts-display" class="text-red-400 text-lg">0</span></div>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center z-30 p-4 text-center">
            <h1 class="text-3xl sm:text-4xl text-white mb-8 text-glow leading-loose">TINY<br>CHEF</h1>
            <p class="text-gray-300 text-[10px] sm:text-xs mb-8 leading-loose uppercase">
                Swipe to cut the food.<br>
                Match the baby plate fractions!<br>
                Precision is key. Don't buzz!
            </p>
            <div class="flex flex-col gap-4">
                <button id="start-btn" class="bg-orange-600 hover:bg-orange-500 text-white border-4 border-white px-6 py-4 rounded text-sm uppercase animate-pulse cursor-pointer shadow-[4px_4px_0_0_#fff] active:shadow-none active:translate-y-1 transition-all">
                    Insert Coin
                </button>
                <button id="start-exit-btn" class="bg-transparent text-gray-300 hover:text-white border-2 border-gray-400 hover:border-white px-4 py-2 rounded text-xs uppercase cursor-pointer transition-colors">
                    Back
                </button>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="absolute inset-0 bg-red-900/90 flex flex-col items-center justify-center z-30 hidden p-4 text-center">
            <h1 class="text-4xl text-white mb-4 alert-glow">TIME'S UP!</h1>
            <p id="game-over-reason" class="text-white text-xs mb-6 uppercase tracking-wider">Service is over!</p>
            <div id="final-stars-display" class="flex gap-2 mb-6">
                <span class="star empty text-5xl drop-shadow-lg">★</span>
                <span class="star empty text-5xl drop-shadow-lg transform -translate-y-2">★</span>
                <span class="star empty text-5xl drop-shadow-lg">★</span>
            </div>
            <p class="text-white text-sm mb-6 font-bold">SCORE: <span id="final-score" class="text-yellow-300">0</span></p>
            <div class="flex flex-col gap-4 w-full max-w-[200px] mx-auto">
                <button id="restart-btn" class="bg-white text-black hover:bg-gray-200 border-4 border-black px-6 py-4 rounded text-sm uppercase cursor-pointer shadow-[4px_4px_0_0_#000] active:shadow-none active:translate-y-1 transition-all">
                    Try Again
                </button>
                <button id="next-level-btn" class="hidden bg-green-500 hover:bg-green-400 text-white border-4 border-white px-6 py-4 rounded text-sm uppercase cursor-pointer shadow-[4px_4px_0_0_#fff] active:shadow-none active:translate-y-1 transition-all">
                    Next Level
                </button>
                <button id="exit-btn" class="bg-transparent text-gray-300 hover:text-white border-2 border-gray-400 hover:border-white px-4 py-2 rounded text-xs uppercase cursor-pointer transition-colors">
                    Save & Exit
                </button>
            </div>
        </div>
        
        <!-- Next Level Screen -->
        <div id="next-level-screen" class="absolute inset-0 bg-green-900/90 flex flex-col items-center justify-center z-30 hidden p-4 text-center">
            <h1 class="text-3xl text-white mb-4 success-glow">PERFECT FIT!</h1>
            <button id="next-btn" class="bg-white text-black hover:bg-gray-200 border-4 border-black px-6 py-4 rounded text-sm uppercase cursor-pointer shadow-[4px_4px_0_0_#000] active:shadow-none active:translate-y-1 transition-all">
                Next Dish
            </button>
        </div>
    </div>

    <script>
        // --- Setup ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const swipeSurface = document.getElementById('swipe-surface');
        
        const GAME_WIDTH = 400;
        const GAME_HEIGHT = 700;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;

        // UI Elements
        const scoreEl = document.getElementById('score-display');
        const levelEl = document.getElementById('level-display');
        const cutsEl = document.getElementById('cuts-display');
        
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const nextLevelScreen = document.getElementById('next-level-screen');

        // Game State
        const urlParams = new URLSearchParams(window.location.search);
        const currentLevelIndex = parseInt(urlParams.get('level')) || 1;
        
        let gameState = 'START'; // START, PLAY, EVALUATING, GAMEOVER
        let score = 0;
        let dishesCompleted = 0;
        let totalErrors = 0;
        let lastTime = 0;
        
        // Slicing State
        let isSwiping = false;
        let swipeStart = null;
        let swipeCurrent = null;
        let slashLine = null; // Visual feedback for successful cut
        let slashTimer = 0;
        
        // Level Data
        let currentLevel = null;
        let cutsLeft = 0;
        let pieces = [];
        let initialArea = 0;

        let timeLeft = 60000;
        let earnedStars = 3;

        // Tolerance for Operation mechanic (15% error margin)
        const ERROR_TOLERANCE = 0.15;

        const SERVICES = [
            // Level 1: 2 simple dishes
            [ { shape: 'orange', goals: [0.5, 0.5], cuts: 1 }, { shape: 'watermelon', goals: [0.5, 0.5], cuts: 1 } ],
            // Level 2: 3 simple dishes
            [ { shape: 'bread', goals: [0.5, 0.5], cuts: 1 }, { shape: 'orange', goals: [0.5, 0.5], cuts: 1 }, { shape: 'watermelon', goals: [0.5, 0.5], cuts: 1 } ],
            // Level 3: 2 complex dishes
            [ { shape: 'bread', goals: [0.25, 0.25, 0.25, 0.25], cuts: 2 }, { shape: 'watermelon', goals: [0.5, 0.25, 0.25], cuts: 2 } ],
            // Level 4: 3 complex dishes
            [ { shape: 'bread', goals: [0.5, 0.25, 0.25], cuts: 2 }, { shape: 'orange', goals: [0.25, 0.25, 0.5], cuts: 2 }, { shape: 'watermelon', goals: [0.5, 0.25, 0.25], cuts: 2 } ],
            // Level 5: 4 very complex dishes
            [ { shape: 'orange', goals: [0.125, 0.125, 0.25, 0.5], cuts: 3 }, { shape: 'watermelon', goals: [0.125, 0.125, 0.25, 0.5], cuts: 3 }, { shape: 'bread', goals: [0.25, 0.25, 0.25, 0.25], cuts: 2 }, { shape: 'orange', goals: [0.25, 0.25, 0.5], cuts: 2 } ]
        ];
        const currentService = SERVICES[Math.min(currentLevelIndex - 1, 4)];

        function getFoodColor(shape) {
            if (shape === 'orange') return '#f39c12';
            if (shape === 'bread') return '#f5d76e';
            if (shape === 'watermelon') return '#e74c3c';
            return '#fff';
        }

        // --- Math & Geometry Functions ---

        // Get polygon area
        function getArea(pts) {
            let area = 0;
            for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
                area += (pts[j].x + pts[i].x) * (pts[j].y - pts[i].y);
            }
            return Math.abs(area / 2);
        }

        // Line intersection
        function lineIntersect(A, B, C, D) {
            const denom = (D.y - C.y)*(B.x - A.x) - (D.x - C.x)*(B.y - A.y);
            if (denom === 0) return null;
            const ua = ((D.x - C.x)*(A.y - C.y) - (D.y - C.y)*(A.x - C.x)) / denom;
            const ub = ((B.x - A.x)*(A.y - C.y) - (B.y - A.y)*(A.x - C.x)) / denom;
            if (ua >= 0 && ua <= 1 && ub >= 0 && ub <= 1) {
                return { x: A.x + ua*(B.x - A.x), y: A.y + ua*(B.y - A.y) };
            }
            return null;
        }

        // Infinite line intersect with segment
        function getLineSegmentIntersect(A, B, C, D) {
            const a1 = B.y - A.y;
            const b1 = A.x - B.x;
            const c1 = a1*A.x + b1*A.y;

            const a2 = D.y - C.y;
            const b2 = C.x - D.x;
            const c2 = a2*C.x + b2*C.y;

            const det = a1*b2 - a2*b1;
            if (det === 0) return null;
            const x = (b2*c1 - b1*c2)/det;
            const y = (a1*c2 - a2*c1)/det;

            // Check if point is on segment C-D
            const rx = Math.abs(D.x - C.x) > 0.001 ? (x - C.x) / (D.x - C.x) : -1;
            const ry = Math.abs(D.y - C.y) > 0.001 ? (y - C.y) / (D.y - C.y) : -1;
            const t = Math.abs(D.x - C.x) > Math.abs(D.y - C.y) ? rx : ry;
            
            if (t >= -0.001 && t <= 1.001) return {x, y};
            return null;
        }

        function countIntersections(A, B, poly) {
            let count = 0;
            for (let i = 0; i < poly.length; i++) {
                const P1 = poly[i];
                const P2 = poly[(i+1)%poly.length];
                if (lineIntersect(A, B, P1, P2)) count++;
            }
            return count;
        }

        // Split polygon by infinite line A-B
        function splitPolygon(poly, A, B) {
            let leftPoly = [];
            let rightPoly = [];
            for (let i = 0; i < poly.length; i++) {
                const P1 = poly[i];
                const P2 = poly[(i+1)%poly.length];
                
                const side1 = (B.x - A.x)*(P1.y - A.y) - (B.y - A.y)*(P1.x - A.x);
                const side2 = (B.x - A.x)*(P2.y - A.y) - (B.y - A.y)*(P2.x - A.x);

                if (side1 >= -0.01) leftPoly.push(P1);
                if (side1 <= 0.01) rightPoly.push(P1);

                if ((side1 > 0 && side2 < 0) || (side1 < 0 && side2 > 0)) {
                    const intP = getLineSegmentIntersect(A, B, P1, P2);
                    if (intP) {
                        leftPoly.push(intP);
                        rightPoly.push(intP);
                    }
                }
            }
            return { left: leftPoly, right: rightPoly };
        }

        // --- Shape Generators ---
        function createShape(type, cx, cy) {
            let pts = [];
            if (type === 'bread') {
                pts = [
                    {x: cx-80, y: cy-80}, {x: cx+80, y: cy-80},
                    {x: cx+80, y: cy+80}, {x: cx-80, y: cy+80}
                ];
            } else if (type === 'orange') {
                for (let i=0; i<16; i++) {
                    let angle = (i/16) * Math.PI * 2;
                    pts.push({ x: cx + Math.cos(angle)*80, y: cy + Math.sin(angle)*80 });
                }
            } else if (type === 'watermelon') {
                pts = [
                    {x: cx, y: cy-80}, {x: cx+80, y: cy+60}, {x: cx-80, y: cy+60}
                ];
            }
            return pts;
        }

        // --- Event Listeners ---
        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (GAME_WIDTH / rect.width),
                y: (clientY - rect.top) * (GAME_HEIGHT / rect.height)
            };
        }

        function handleStart(e) {
            if (gameState !== 'PLAY') return;
            e.preventDefault();
            isSwiping = true;
            swipeStart = getPointerPos(e);
            swipeCurrent = swipeStart;
        }

        function handleMove(e) {
            if (!isSwiping || gameState !== 'PLAY') return;
            e.preventDefault();
            swipeCurrent = getPointerPos(e);
        }

        function handleEnd(e) {
            if (!isSwiping || gameState !== 'PLAY') return;
            e.preventDefault();
            isSwiping = false;
            
            // Minimum swipe distance
            const dx = swipeCurrent.x - swipeStart.x;
            const dy = swipeCurrent.y - swipeStart.y;
            if (Math.hypot(dx, dy) < 20) return;

            processCut(swipeStart, swipeCurrent);
        }

        swipeSurface.addEventListener('touchstart', handleStart, {passive: false});
        swipeSurface.addEventListener('touchmove', handleMove, {passive: false});
        swipeSurface.addEventListener('touchend', handleEnd, {passive: false});
        swipeSurface.addEventListener('mousedown', handleStart);
        swipeSurface.addEventListener('mousemove', handleMove);
        swipeSurface.addEventListener('mouseup', handleEnd);
        swipeSurface.addEventListener('mouseleave', () => { isSwiping = false; });

        function setupButton(id, callback) {
            const btn = document.getElementById(id);
            if (!btn) return;
            const handler = (e) => {
                e.preventDefault(); // prevent double firing or touch-swallowing
                e.stopPropagation();
                callback();
            };
            // Use pointerdown for immediate click/touch response
            btn.addEventListener('pointerdown', handler);
            // Fallback to click just in case
            btn.addEventListener('click', handler);
        }

        setupButton('start-btn', () => initGame(true));
        setupButton('restart-btn', () => initGame(true));
        setupButton('next-btn', () => initGame(false));
        setupButton('next-level-btn', () => {
            window.parent.postMessage({ type: 'NEXT_LEVEL', score: score * 10, stars: earnedStars, level: currentLevelIndex }, '*');
        });
        
        // Setup Exit buttons
        const exitGame = () => { 
            gameLoopRunning = false;
            window.parent.postMessage({ type: 'EXIT_GAME', score: score }, '*'); 
            score = 0;
        };
        setupButton('exit-btn', exitGame);
        setupButton('hud-exit-btn', exitGame);
        setupButton('start-exit-btn', exitGame);

        // --- Game Logic ---

        function triggerGameOver(reasonStr) {
            document.getElementById('game-container').style.transform = 'translate(10px, 10px)';
            setTimeout(() => { document.getElementById('game-container').style.transform = 'translate(-10px, -10px)'; }, 50);
            setTimeout(() => { document.getElementById('game-container').style.transform = 'translate(0, 0)'; }, 100);
            
            document.getElementById('game-over-reason').innerText = reasonStr;
            document.getElementById('final-score').innerText = "FAILED";
            document.getElementById('game-over-screen').querySelector('h1').innerText = "GAME OVER";
            document.getElementById('game-over-screen').querySelector('h1').className = "text-4xl text-white mb-4 alert-glow";
            
            const finalStarsContainer = document.getElementById('final-stars-display');
            if (finalStarsContainer) {
                const finalStarSpans = finalStarsContainer.querySelectorAll('.star');
                finalStarSpans.forEach((star) => {
                    star.classList.remove('earned');
                    star.classList.add('empty');
                });
            }
            
            const nextLevelBtn = document.getElementById('next-level-btn');
            if (nextLevelBtn) {
                nextLevelBtn.classList.add('hidden');
            }
            
            gameOverScreen.classList.remove('hidden');
            gameState = 'GAMEOVER';
            
            // Send score to parent window
            window.parent.postMessage({ type: 'GAME_OVER', score: 0, stars: 0 }, '*');
            score = 0;
        }

        function loadSubLevel(subLvl) {
            currentLevel = subLvl;
            cutsLeft = currentLevel.cuts;
            
            pieces = [{
                pts: createShape(currentLevel.shape, GAME_WIDTH/2, GAME_HEIGHT/2 + 50),
                color: getFoodColor(currentLevel.shape),
                type: currentLevel.shape,
                cx: GAME_WIDTH/2,
                cy: GAME_HEIGHT/2 + 50
            }];
            
            initialArea = getArea(pieces[0].pts);
        }

        let levelEndTime = 0;

        function buildLevel() {
            let config = currentService[dishesCompleted];
            loadSubLevel(config);
        }

        function initGame(resetAll) {
            if (resetAll) {
                score = 0;
                dishesCompleted = 0;
                totalErrors = 0;
                timeLeft = 60000;
                earnedStars = 3;
                document.getElementById('star-1').className = 'star earned';
                document.getElementById('star-2').className = 'star earned';
                document.getElementById('star-3').className = 'star earned';
                levelEndTime = performance.now() + 60000;
            }

            buildLevel();

            gameState = 'PLAY';
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            nextLevelScreen.classList.add('hidden');
            
            document.getElementById('time-display').innerText = (Math.max(0, timeLeft) / 1000).toFixed(1);
            
            updateHUD();
            
            lastTime = performance.now();
            if (!gameLoopRunning) {
                gameLoopRunning = true;
                requestAnimationFrame(gameLoop);
            }
        }

        function updateHUD() {
            scoreEl.innerText = score;
            cutsEl.innerText = cutsLeft;
        }

        function processCut(start, end) {
            let didCut = false;
            
            // Iterate backwards to safely splice
            for (let i = pieces.length - 1; i >= 0; i--) {
                const piece = pieces[i];
                const ints = countIntersections(start, end, piece.pts);
                
                // If segment crosses the piece (at least 2 intersections)
                if (ints >= 2) {
                    didCut = true;
                    const split = splitPolygon(piece.pts, start, end);
                    
                    // Filter out tiny slivers
                    const areaLeft = getArea(split.left);
                    const areaRight = getArea(split.right);
                    
                    pieces.splice(i, 1); // remove original

                    // Calculate separation normal
                    let nx = -(end.y - start.y);
                    let ny = (end.x - start.x);
                    let len = Math.hypot(nx, ny);
                    nx /= len; ny /= len;

                    const SHIFT = 8; // Pixels to push pieces apart

                    if (areaLeft > 50) {
                        let shifted = split.left.map(p => ({ x: p.x + nx*SHIFT, y: p.y + ny*SHIFT }));
                        pieces.push({ pts: shifted, color: getFoodColor(piece.type), type: piece.type, cx: piece.cx + nx*SHIFT, cy: piece.cy + ny*SHIFT });
                    }
                    if (areaRight > 50) {
                        let shifted = split.right.map(p => ({ x: p.x - nx*SHIFT, y: p.y - ny*SHIFT }));
                        pieces.push({ pts: shifted, color: getFoodColor(piece.type), type: piece.type, cx: piece.cx - nx*SHIFT, cy: piece.cy - ny*SHIFT });
                    }
                }
            }

            if (didCut) {
                slashLine = { s: start, e: end };
                slashTimer = 300; // ms
                cutsLeft--;
                updateHUD();
                
                if (cutsLeft <= 0) {
                    gameState = 'EVALUATING';
                    setTimeout(evaluateCuts, 250);
                }
            }
        }

        function evaluateCuts() {
            // Get user fractions
            let userFracs = pieces.map(p => getArea(p.pts) / initialArea);
            userFracs.sort((a, b) => b - a);
            
            let goalFracs = [...currentLevel.goals].sort((a, b) => b - a);

            let passed = true;
            let errorSum = 0;
            
            // Lenient check: only verify the top N pieces match the goals
            if (userFracs.length < goalFracs.length) {
                passed = false;
            } else {
                for (let i = 0; i < goalFracs.length; i++) {
                    const err = Math.abs(userFracs[i] - goalFracs[i]);
                    errorSum += err;
                    if (err > ERROR_TOLERANCE) {
                        passed = false;
                        break;
                    }
                }
            }

            if (passed) {
                let dishAvgError = errorSum / goalFracs.length;
                totalErrors += dishAvgError;
                score += 100;
                dishesCompleted++;
                
                if (dishesCompleted >= currentService.length) {
                    gameState = 'GAMEOVER';
                    
                    let avgError = totalErrors / dishesCompleted;
                    let finalStars = 1;
                    if (avgError <= 0.10) finalStars = 2; // <= 10% error per piece average
                    if (avgError <= 0.05) finalStars = 3; // <= 5% error per piece average
                    
                    document.getElementById('game-over-reason').innerText = "Service Complete!";
                    document.getElementById('final-score').innerText = "CLEARED!";
                    document.getElementById('game-over-screen').querySelector('h1').innerText = "LEVEL CLEAR!";
                    document.getElementById('game-over-screen').querySelector('h1').className = "text-4xl text-white mb-4 text-glow";
                    
                    const finalStarsContainer = document.getElementById('final-stars-display');
                    if (finalStarsContainer) {
                        const finalStarSpans = finalStarsContainer.querySelectorAll('.star');
                        finalStarSpans.forEach((star, index) => {
                            if (index < finalStars) {
                                star.classList.add('earned');
                                star.classList.remove('empty');
                            } else {
                                star.classList.remove('earned');
                                star.classList.add('empty');
                            }
                        });
                    }
                    
                    const nextLevelBtn = document.getElementById('next-level-btn');
                    if (nextLevelBtn) {
                        if (currentLevelIndex < 5) {
                            nextLevelBtn.classList.remove('hidden');
                        } else {
                            nextLevelBtn.classList.add('hidden');
                        }
                    }
                    
                    gameOverScreen.classList.remove('hidden');
                    window.parent.postMessage({ type: 'GAME_OVER', score: score * 10, stars: finalStars }, '*');
                    score = 0;
                } else {
                    gameState = 'SUCCESS';
                    setTimeout(() => {
                        buildLevel();
                        gameState = 'PLAY';
                        updateHUD();
                    }, 800);
                }
            } else {
                triggerGameOver("Poor Precision!");
            }
        }

        function update(dt) {
            if (slashTimer > 0) slashTimer -= dt;
            
            if (gameState === 'PLAY') {
                timeLeft = levelEndTime - performance.now();
                document.getElementById('time-display').innerText = (Math.max(0, timeLeft) / 1000).toFixed(1);

                if (timeLeft <= 0) {
                    timeLeft = 0;
                    triggerGameOver("TIME'S UP!");
                }
            }
        }

        // --- Drawing ---

        function drawBunnyChef(x, y) {
            const w = 60, h = 70;
            
            // Chef Hat (Clouds)
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(x + w*0.3, y - 10, 15, 0, Math.PI*2);
            ctx.arc(x + w*0.7, y - 10, 15, 0, Math.PI*2);
            ctx.arc(x + w*0.5, y - 25, 20, 0, Math.PI*2);
            ctx.fill();
            // Hat base
            ctx.fillRect(x + w*0.2, y - 5, w*0.6, 15);

            // Bunny Body
            ctx.fillStyle = '#FF99CC'; 
            ctx.fillRect(x, y + h*0.4, w, h*0.6); 
            
            // Ears
            ctx.fillRect(x + w*0.15, y + 5, w*0.2, h*0.4); 
            ctx.fillRect(x + w*0.65, y + 5, w*0.2, h*0.4); 
            
            // Eyes
            ctx.fillStyle = gameState === 'GAMEOVER' ? '#000000' : '#FF0055';
            if(gameState === 'GAMEOVER') {
                // X eyes
                ctx.font = '10px monospace';
                ctx.fillText('X', x + w*0.2, y + h*0.65);
                ctx.fillText('X', x + w*0.65, y + h*0.65);
            } else {
                ctx.fillRect(x + w*0.2, y + h*0.5, w*0.15, w*0.15); 
                ctx.fillRect(x + w*0.65, y + h*0.5, w*0.15, w*0.15);
            }
            
            // Nose
            ctx.fillStyle = '#CC3366';
            ctx.fillRect(x + w*0.45, y + h*0.7, w*0.1, w*0.1); 
        }

        function drawBabyPlate(cx, cy, r, goals) {
            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath(); ctx.arc(cx+3, cy+5, r, 0, Math.PI*2); ctx.fill();
            
            // Plate Base
            ctx.fillStyle = '#ecf0f1';
            ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
            
            // Outer Rim
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#3498db'; // Baby blue edge
            ctx.stroke();

            // Compartment dividers
            let startAngle = -Math.PI/2; 
            ctx.strokeStyle = '#bdc3c7';
            ctx.lineWidth = 3;
            
            goals.forEach(g => {
                let angle = g * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, r, startAngle, startAngle + angle);
                ctx.lineTo(cx, cy);
                ctx.stroke();
                
                // Light tint per compartment
                ctx.fillStyle = 'rgba(52, 152, 219, 0.1)';
                ctx.fill();
                
                startAngle += angle;
            });
        }

        function draw() {
            // Background Wooden Table
            ctx.fillStyle = '#2c1e16';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            if (gameState === 'START') return;

            // Draw Baby Plate Goal
            drawBabyPlate(GAME_WIDTH / 2, 120, 60, currentLevel ? currentLevel.goals : []);

            // Draw Cutting Board
            ctx.fillStyle = '#d35400';
            const cbY = 220;
            const cbH = 340;
            // Rounded rect hack for retro canvas
            ctx.fillRect(20, cbY + 20, GAME_WIDTH - 40, cbH - 40);
            ctx.fillRect(40, cbY, GAME_WIDTH - 80, cbH);
            ctx.fillStyle = '#e67e22'; // Inner board
            ctx.fillRect(30, cbY + 20, GAME_WIDTH - 60, cbH - 40);
            ctx.fillRect(40, cbY + 10, GAME_WIDTH - 80, cbH - 20);

            // Draw Food Name on Cutting Board
            if (currentLevel) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.font = '12px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.fillText(`- ${currentLevel.shape.toUpperCase()} -`, GAME_WIDTH / 2 + 2, cbY + 37);
                ctx.fillStyle = '#ffffff';
                ctx.fillText(`- ${currentLevel.shape.toUpperCase()} -`, GAME_WIDTH / 2, cbY + 35);
            }

            // Draw Bunny Chef at bottom
            drawBunnyChef(GAME_WIDTH / 2 - 30, GAME_HEIGHT - 100);

            // Draw Food Pieces
            pieces.forEach(p => {
                ctx.save();
                
                // 1. Create Clipping Path for the sliced piece
                ctx.beginPath();
                if(p.pts.length > 0) {
                    ctx.moveTo(p.pts[0].x, p.pts[0].y);
                    for (let i=1; i<p.pts.length; i++) ctx.lineTo(p.pts[i].x, p.pts[i].y);
                }
                ctx.closePath();
                ctx.clip(); // Restrict drawing to inside this piece

                // 2. Draw Detailed Food Texture based on original center
                if (p.type === 'watermelon') {
                    // Red flesh
                    ctx.fillStyle = '#e74c3c';
                    ctx.fillRect(p.cx-100, p.cy-100, 200, 200);
                    // Green rind at bottom
                    ctx.fillStyle = '#2ecc71';
                    ctx.fillRect(p.cx-100, p.cy+45, 200, 30);
                    // White pith line
                    ctx.fillStyle = '#ecf0f1';
                    ctx.fillRect(p.cx-100, p.cy+40, 200, 5);
                    // Seeds
                    ctx.fillStyle = '#111';
                    ctx.fillRect(p.cx-20, p.cy-10, 5, 8);
                    ctx.fillRect(p.cx+20, p.cy-10, 5, 8);
                    ctx.fillRect(p.cx, p.cy+15, 5, 8);
                    ctx.fillRect(p.cx-40, p.cy+20, 5, 8);
                    ctx.fillRect(p.cx+40, p.cy+20, 5, 8);
                } 
                else if (p.type === 'orange') {
                    // Orange rind
                    ctx.fillStyle = '#d35400';
                    ctx.fillRect(p.cx-100, p.cy-100, 200, 200);
                    // White pith
                    ctx.fillStyle = '#fdf5e6';
                    ctx.beginPath(); ctx.arc(p.cx, p.cy, 75, 0, Math.PI*2); ctx.fill();
                    // Inner flesh
                    ctx.fillStyle = '#f39c12';
                    ctx.beginPath(); ctx.arc(p.cx, p.cy, 70, 0, Math.PI*2); ctx.fill();
                    // Segments
                    ctx.strokeStyle = '#fdf5e6';
                    ctx.lineWidth = 4;
                    for(let i=0; i<8; i++) {
                        let angle = (i/8) * Math.PI * 2;
                        ctx.beginPath();
                        ctx.moveTo(p.cx, p.cy);
                        ctx.lineTo(p.cx + Math.cos(angle)*70, p.cy + Math.sin(angle)*70);
                        ctx.stroke();
                    }
                    // Center pith
                    ctx.fillStyle = '#fdf5e6';
                    ctx.beginPath(); ctx.arc(p.cx, p.cy, 8, 0, Math.PI*2); ctx.fill();
                }
                else if (p.type === 'bread') {
                    // Dark Crust
                    ctx.fillStyle = '#d35400';
                    ctx.fillRect(p.cx-100, p.cy-100, 200, 200);
                    // Light crumb
                    ctx.fillStyle = '#f5d76e';
                    ctx.fillRect(p.cx-75, p.cy-75, 150, 150);
                    // Bread texture (air pockets)
                    ctx.fillStyle = '#e67e22';
                    ctx.fillRect(p.cx-40, p.cy-30, 6, 6);
                    ctx.fillRect(p.cx+30, p.cy-50, 8, 5);
                    ctx.fillRect(p.cx+40, p.cy+20, 5, 8);
                    ctx.fillRect(p.cx-20, p.cy+40, 7, 7);
                    ctx.fillRect(p.cx, p.cy, 8, 5);
                }

                ctx.restore(); // Remove clipping

                // 3. Draw Cut Edge Outline
                ctx.beginPath();
                if(p.pts.length > 0) {
                    ctx.moveTo(p.pts[0].x, p.pts[0].y);
                    for (let i=1; i<p.pts.length; i++) ctx.lineTo(p.pts[i].x, p.pts[i].y);
                }
                ctx.closePath();
                ctx.lineWidth = 2;
                ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                ctx.stroke();
            });

            // Draw swipe trail
            if (isSwiping && swipeStart && swipeCurrent) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(swipeStart.x, swipeStart.y);
                ctx.lineTo(swipeCurrent.x, swipeCurrent.y);
                ctx.stroke();
            }

            // Draw successful slash feedback
            if (slashTimer > 0 && slashLine) {
                ctx.strokeStyle = `rgba(255, 255, 255, ${slashTimer / 300})`;
                ctx.lineWidth = 6;
                ctx.beginPath();
                
                // Extend visual line
                let dx = slashLine.e.x - slashLine.s.x;
                let dy = slashLine.e.y - slashLine.s.y;
                ctx.moveTo(slashLine.s.x - dx*2, slashLine.s.y - dy*2);
                ctx.lineTo(slashLine.e.x + dx*2, slashLine.e.y + dy*2);
                ctx.stroke();
            }

            // Evaluating Overlay
            if (gameState === 'EVALUATING') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                ctx.fillStyle = '#00FF00';
                ctx.font = '20px "Press Start 2P"';
                ctx.textAlign = 'center';
                
                // Blinking text
                if (Math.floor(performance.now() / 200) % 2 === 0) {
                    ctx.fillText('CHECKING FIT...', GAME_WIDTH / 2, GAME_HEIGHT / 2);
                }
            } else if (gameState === 'SUCCESS') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                ctx.fillStyle = '#2ecc71';
                ctx.font = '30px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.fillText('PERFECT!', GAME_WIDTH / 2, GAME_HEIGHT / 2);
                ctx.fillStyle = '#fff';
                ctx.font = '14px "Press Start 2P"';
                ctx.fillText('+100 PTS', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 40);
            }
        }

        let gameLoopRunning = false;

        function gameLoop(timestamp) {
            let dt = timestamp - lastTime;
            lastTime = timestamp;
            if (dt > 100 || dt < 0 || isNaN(dt)) dt = 16; 

            update(dt);
            draw();
            if (gameLoopRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        // Boot
        draw();

        if (urlParams.get('autoStart') === 'true') {
            initGame(true);
        }

    </script>
