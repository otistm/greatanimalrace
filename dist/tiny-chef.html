        function getFoodColor(id) {
            return (FOODS[id] && FOODS[id].color) || '#fff';
        }
        function getFoodLabel(id) {
            return (FOODS[id] && FOODS[id].label) || (id || '').toUpperCase();
        }
        function createShape(id, cx, cy) {
            const food = FOODS[id];
            return food ? food.shape(cx, cy) : polyRect(cx, cy, 160, 160);
        }

        // --- Event Listeners ---
        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (GAME_WIDTH / rect.width),
                y: (clientY - rect.top) * (GAME_HEIGHT / rect.height)
            };
        }

        function handleStart(e) {
            if (gameState !== 'PLAY') return;
            e.preventDefault();
            isSwiping = true;
            const p = getPointerPos(e);
            swipePath = [p];
            liveCutSegments = 1;
        }

        function handleMove(e) {
            if (!isSwiping || gameState !== 'PLAY') return;
            e.preventDefault();
            const p = getPointerPos(e);
            const last = swipePath[swipePath.length - 1];
            const dx = p.x - last.x, dy = p.y - last.y;
            if (dx*dx + dy*dy < SAMPLE_MIN_DIST_SQ) return;
            swipePath.push(p);
            // Live preview of how many cuts this swipe will consume.
            if (swipePath.length >= 2) {
                const simp = douglasPeucker(swipePath, SIMPLIFY_TOLERANCE);
                liveCutSegments = Math.max(1, simp.length - 1);
            }
        }

        function handleEnd(e) {
            if (!isSwiping || gameState !== 'PLAY') return;
            e.preventDefault();
            isSwiping = false;
            // Push final pointer pos so the simplification sees the actual end.
            try {
                const p = getPointerPos(e);
                if (swipePath.length === 0) swipePath.push(p);
                else {
                    const last = swipePath[swipePath.length - 1];
                    if (Math.hypot(p.x - last.x, p.y - last.y) > 0.5) swipePath.push(p);
                }
            } catch (_) { /* touchend has no coords on some browsers */ }

            if (swipePath.length < 2) { swipePath = []; return; }

            // Reject ultra-tiny swipes (taps).
            const start = swipePath[0];
            const end = swipePath[swipePath.length - 1];
            const totalLen = polylineLength(swipePath);
            if (totalLen < 20 && Math.hypot(end.x - start.x, end.y - start.y) < 20) {
                swipePath = [];
                return;
            }

            processSwipe(swipePath);
            swipePath = [];
        }

        swipeSurface.addEventListener('touchstart', handleStart, {passive: false});
        swipeSurface.addEventListener('touchmove', handleMove, {passive: false});
        swipeSurface.addEventListener('touchend', handleEnd, {passive: false});
        swipeSurface.addEventListener('mousedown', handleStart);
        swipeSurface.addEventListener('mousemove', handleMove);
        swipeSurface.addEventListener('mouseup', handleEnd);
        swipeSurface.addEventListener('mouseleave', () => { isSwiping = false; });

        function setupButton(id, callback) {
            const btn = document.getElementById(id);
            if (!btn) return;
            const handler = (e) => {
                e.preventDefault(); // prevent double firing or touch-swallowing
                e.stopPropagation();
                callback();
            };
            // Use pointerdown for immediate click/touch response
            btn.addEventListener('pointerdown', handler);
            // Fallback to click just in case
            btn.addEventListener('click', handler);
        }

        setupButton('start-btn', () => initGame(true));
        setupButton('restart-btn', () => initGame(true));
        setupButton('next-btn', () => initGame(false));
        setupButton('plate-btn', platePresent);
        setupButton('next-level-btn', () => {
            // Navigation-only per SCORING_GUIDE.md §1.
            window.parent.postMessage({ type: 'NEXT_LEVEL', gameId: GAME_ID, level: currentLevelIndex }, '*');
        });

        // Setup Exit buttons
        const exitGame = () => {
            gameLoopRunning = false;
            window.parent.postMessage({ type: 'EXIT_GAME', gameId: GAME_ID }, '*');
        };
        setupButton('exit-btn', exitGame);
        setupButton('hud-exit-btn', exitGame);
        setupButton('start-exit-btn', exitGame);

        // --- Game Logic ---

        function triggerGameOver(reasonStr) {
            document.getElementById('game-container').style.transform = 'translate(10px, 10px)';
            setTimeout(() => { document.getElementById('game-container').style.transform = 'translate(-10px, -10px)'; }, 50);
            setTimeout(() => { document.getElementById('game-container').style.transform = 'translate(0, 0)'; }, 100);

            document.getElementById('game-over-reason').innerText = reasonStr;
            // Numeric canonical score on failure (dishes done so far + 0 star bonus).
            const failScore = canonicalScore(0);
            document.getElementById('final-score').innerText = failScore;
            document.getElementById('game-over-screen').querySelector('h1').innerText = "GAME OVER";
            document.getElementById('game-over-screen').querySelector('h1').className = "text-4xl text-white mb-4 alert-glow";
            gameOverScreen.classList.remove('bg-purple-900/90');
            gameOverScreen.classList.add('bg-red-900/90');

            const finalStarsContainer = document.getElementById('final-stars-display');
            if (finalStarsContainer) {
                const finalStarSpans = finalStarsContainer.querySelectorAll('.star');
                finalStarSpans.forEach((star) => {
                    star.classList.remove('earned');
                    star.classList.add('empty');
                });
            }

            const nextLevelBtn = document.getElementById('next-level-btn');
            if (nextLevelBtn) {
                nextLevelBtn.classList.add('hidden');
            }

            // Fail → "Try Again".
            const restartBtn = document.getElementById('restart-btn');
            if (restartBtn) restartBtn.innerText = 'Try Again';

            gameOverScreen.classList.remove('hidden');
            gameState = 'GAMEOVER';

            postResult(0, 'fail');
        }

        function loadSubLevel(subLvl) {
            currentLevel = subLvl;
            cutsLeft = currentLevel.cuts;
            
            pieces = [{
                pts: createShape(currentLevel.shape, GAME_WIDTH/2, GAME_HEIGHT/2 + 50),
                color: getFoodColor(currentLevel.shape),
                type: currentLevel.shape,
                cx: GAME_WIDTH/2,
                cy: GAME_HEIGHT/2 + 50
            }];
            
            initialArea = getArea(pieces[0].pts);
        }

        let levelEndTime = 0;

        function buildLevel() {
            let config = currentService[dishesCompleted];
            // Inject a freshly-picked food into this dish slot. The recipe
            // (goals + cuts) is fixed per level; the food is randomized.
            loadSubLevel({ ...config, shape: pickNextFood() });
        }

        function initGame(resetAll) {
            if (resetAll) {
                score = 0;
                dishesCompleted = 0;
                totalErrors = 0;
                timeLeft = 60000;
                resultPosted = false;
                slashPath = null;
                slashTimer = 0;
                swipePath = [];
                isSwiping = false;
                const plateBtn0 = document.getElementById('plate-btn');
                if (plateBtn0) {
                    plateBtn0.disabled = true;
                    plateBtn0.classList.remove('plate-ready');
                }
                // Food rotation is persisted in localStorage and managed
                // lazily inside pickNextFood(); no reshuffle needed here.
                // HUD inits to 0 stars per SCORING_GUIDE.md §3 (no flash).
                document.getElementById('star-1').className = 'star';
                document.getElementById('star-2').className = 'star';
                document.getElementById('star-3').className = 'star';
                levelEndTime = performance.now() + 60000;
            }

            buildLevel();

            gameState = 'PLAY';
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            nextLevelScreen.classList.add('hidden');
            
            document.getElementById('time-display').innerText = (Math.max(0, timeLeft) / 1000).toFixed(1);
            
            updateHUD();
            
            lastTime = performance.now();
            if (!gameLoopRunning) {
                gameLoopRunning = true;
                requestAnimationFrame(gameLoop);
            }
        }

        // True iff the current pieces match the goal within ERROR_TOLERANCE.
        // Used by updateHUD() to glow the Plate-It! button when the player
        // can submit with a passing score.
        function goalMatches() {
            if (!currentLevel || pieces.length === 0) return false;
            const userFracs = pieces.map(p => getArea(p.pts) / initialArea)
                                    .sort((a, b) => b - a);
            const goalFracs = [...currentLevel.goals].sort((a, b) => b - a);
            if (userFracs.length < goalFracs.length) return false;
            for (let i = 0; i < goalFracs.length; i++) {
                if (Math.abs(userFracs[i] - goalFracs[i]) > ERROR_TOLERANCE) return false;
            }
            return true;
        }

        // Soft cuts budget: the player can submit the dish at any time after
        // making at least one cut, instead of being forced to spend every cut
        // in the recipe. Fixes the "stuck with 1 cut left but the goal needs
        // more" trap that the freeform-cut system can produce when the player
        // over-spends the budget on an unintended bent swipe, OR achieves the
        // goal with fewer cuts than the recipe expected.
        function platePresent() {
            if (gameState !== 'PLAY') return;
            if (!currentLevel) return;
            if (cutsLeft >= currentLevel.cuts) return; // need at least one cut first
            gameState = 'EVALUATING';
            setTimeout(evaluateCuts, 200);
        }

        function updateHUD() {
            scoreEl.innerText = score;
            cutsEl.innerText = cutsLeft;
            const plateBtn = document.getElementById('plate-btn');
            if (plateBtn && currentLevel) {
                const used = cutsLeft < currentLevel.cuts;
                const ready = used && goalMatches();
                plateBtn.disabled = !used;
                plateBtn.classList.toggle('plate-ready', ready);
            }
        }

        // Single freeform swipe (1+ segments). Cut budget consumed = number of
        // straight segments after Douglas-Peucker simplification. Each piece
        // is clipped along the polyline; resulting sub-pieces drift outward
        // from the original centroid for a "broken apart" look.
        function processSwipe(rawPath) {
            // 1. Simplify the swipe path so finger jitter doesn't add bends.
            const simplified = douglasPeucker(rawPath, SIMPLIFY_TOLERANCE);
            if (simplified.length < 2) return;
            const segments = simplified.length - 1;

            // 2. Refuse the swipe if the player doesn't have enough cuts to
            // pay for every segment. (No partial polyline cuts.)
            if (segments > cutsLeft) {
                slashPath = simplified;
                slashTimer = 250;
                return;
            }

            // 3. Extend the FIRST and LAST segments outward so a swipe that
            // ends inside the food still cleaves through.
            const cutLine = extendPolylineEnds(simplified, CUT_EXTEND_PX);
            const SHIFT = 8;
            let didCut = false;
            const newPieces = [];

            for (let i = 0; i < pieces.length; i++) {
                const piece = pieces[i];
                let result;
                try {
                    result = clipPolygonByPolyline(piece.pts, cutLine);
                } catch (_) {
                    result = [piece.pts];
                }

                if (result.length <= 1) {
                    newPieces.push(piece);
                    continue;
                }

                // Filter slivers and shift each sub-piece outward from the
                // original piece's centroid for a separation effect.
                const origCenter = centroidOf(piece.pts);
                let pieceCutOnce = false;

                for (const sub of result) {
                    if (sub.length < 3) continue;
                    if (getArea(sub) < 50) continue;
                    pieceCutOnce = true;

                    const subCenter = centroidOf(sub);
                    let dx = subCenter.x - origCenter.x;
                    let dy = subCenter.y - origCenter.y;
                    const len = Math.hypot(dx, dy);
                    let sx = 0, sy = 0;
                    if (len > 0.01) { sx = dx / len * SHIFT; sy = dy / len * SHIFT; }

                    const shifted = sub.map(p => ({ x: p.x + sx, y: p.y + sy }));
                    newPieces.push({
                        pts: shifted,
                        color: getFoodColor(piece.type),
                        type: piece.type,
                        cx: piece.cx + sx,
                        cy: piece.cy + sy
                    });
                }

                if (pieceCutOnce) {
                    didCut = true;
                } else {
                    // Clip produced only slivers — keep the original piece intact.
                    newPieces.push(piece);
                }
            }

            if (didCut) {
                pieces = newPieces;
                slashPath = extendPolylineEnds(simplified, 60); // visual flourish
                slashTimer = 300;
                cutsLeft -= segments;
                updateHUD();

                if (cutsLeft <= 0) {
                    gameState = 'EVALUATING';
                    setTimeout(evaluateCuts, 250);
                }
            }
        }

        function evaluateCuts() {
            // Get user fractions
            let userFracs = pieces.map(p => getArea(p.pts) / initialArea);
            userFracs.sort((a, b) => b - a);
            
            let goalFracs = [...currentLevel.goals].sort((a, b) => b - a);

            let passed = true;
            let errorSum = 0;
            
            // Lenient check: only verify the top N pieces match the goals
            if (userFracs.length < goalFracs.length) {
                passed = false;
            } else {
                for (let i = 0; i < goalFracs.length; i++) {
                    const err = Math.abs(userFracs[i] - goalFracs[i]);
                    errorSum += err;
                    if (err > ERROR_TOLERANCE) {
                        passed = false;
                        break;
                    }
                }
            }

            if (passed) {
                let dishAvgError = errorSum / goalFracs.length;
                totalErrors += dishAvgError;
                dishesCompleted++;
                updateLiveStars();
                score = canonicalScore(previewStarsFromErrors());
                updateHUD();

                if (dishesCompleted >= currentService.length) {
                    gameState = 'GAMEOVER';

                    let avgError = totalErrors / dishesCompleted;
                    let finalStars = 1;
                    if (avgError <= TWO_STAR_TOLERANCE) finalStars = 2;
                    if (avgError <= THREE_STAR_TOLERANCE) finalStars = 3;

                    const finalScore = canonicalScore(finalStars);
                    score = finalScore;

                    document.getElementById('game-over-reason').innerText = "Service Complete!";
                    document.getElementById('final-score').innerText = finalScore;
                    document.getElementById('game-over-screen').querySelector('h1').innerText = "LEVEL CLEAR!";
                    document.getElementById('game-over-screen').querySelector('h1').className = "text-4xl text-white mb-4 text-glow";
                    gameOverScreen.classList.remove('bg-red-900/90');
                    gameOverScreen.classList.add('bg-purple-900/90');
                    
                    const finalStarsContainer = document.getElementById('final-stars-display');
                    if (finalStarsContainer) {
                        const finalStarSpans = finalStarsContainer.querySelectorAll('.star');
                        finalStarSpans.forEach((star, index) => {
                            if (index < finalStars) {
                                star.classList.add('earned');
                                star.classList.remove('empty');
                            } else {
                                star.classList.remove('earned');
                                star.classList.add('empty');
                            }
                        });
                    }
                    
                    const nextLevelBtn = document.getElementById('next-level-btn');
                    if (nextLevelBtn) {
                        if (currentLevelIndex < 5) {
                            nextLevelBtn.classList.remove('hidden');
                        } else {
                            nextLevelBtn.classList.add('hidden');
                        }
                    }

                    // Win → "Play Again" (replay for a higher star count).
                    const restartBtn = document.getElementById('restart-btn');
                    if (restartBtn) restartBtn.innerText = 'Play Again';

                    gameOverScreen.classList.remove('hidden');
                    postResult(finalStars, 'win');
                } else {
                    gameState = 'SUCCESS';
                    setTimeout(() => {
                        buildLevel();
                        gameState = 'PLAY';
                        updateHUD();
                    }, 800);
                }
            } else {
                triggerGameOver("Poor Precision!");
            }
        }

        function update(dt) {
            if (slashTimer > 0) slashTimer -= dt;
            
            if (gameState === 'PLAY') {
                timeLeft = levelEndTime - performance.now();
                document.getElementById('time-display').innerText = (Math.max(0, timeLeft) / 1000).toFixed(1);

                if (timeLeft <= 0) {
                    timeLeft = 0;
                    triggerGameOver("TIME'S UP!");
                }
            }
        }

        // --- Drawing ---

        function drawBunnyChef(x, y) {
            const w = 60, h = 70;

            // Layer 1: cotton-ball tail peeking out behind the body on the
            // left side (chef faces forward, so the tail just shows as a
            // small white tuft).
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(x + w*0.08, y + h*0.82, w*0.1, 0, Math.PI*2); ctx.fill();

            // Layer 2: soft pink ellipse body (matches the round head).
            ctx.fillStyle = '#ff99cc';
            ctx.beginPath(); ctx.ellipse(x + w*0.5, y + h*0.78, w*0.42, h*0.22, 0, 0, Math.PI*2); ctx.fill();

            // Layer 2b: tiny white chef-coat strip down the front of the body.
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.ellipse(x + w*0.5, y + h*0.8, w*0.1, h*0.18, 0, 0, Math.PI*2); ctx.fill();
            // Two coat buttons.
            ctx.fillStyle = '#c0392b';
            ctx.beginPath(); ctx.arc(x + w*0.5, y + h*0.74, w*0.025, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x + w*0.5, y + h*0.84, w*0.025, 0, Math.PI*2); ctx.fill();

            // Layer 3: paw feet at the bottom.
            ctx.fillStyle = '#ff99cc';
            ctx.beginPath(); ctx.ellipse(x + w*0.32, y + h*0.99, w*0.13, h*0.045, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(x + w*0.68, y + h*0.99, w*0.13, h*0.045, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ffd2e2';
            ctx.beginPath(); ctx.ellipse(x + w*0.32, y + h*0.99, w*0.06, h*0.02, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(x + w*0.68, y + h*0.99, w*0.06, h*0.02, 0, 0, Math.PI*2); ctx.fill();

            // --- Layer 4: circle-mascot head (matches swaddle-gami / bottle-rama) ---
            ctx.fillStyle = '#ff99cc';
            const headCx = x + w*0.5;
            const headCy = y + h*0.4;
            const headR  = w*0.4;

            // Ears - ellipses behind the head.
            ctx.fillStyle = '#ff99cc';
            ctx.beginPath(); ctx.ellipse(headCx - headR*0.55, headCy - headR*1.1, headR*0.32, headR*0.9, -0.2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(headCx + headR*0.55, headCy - headR*1.1, headR*0.32, headR*0.9,  0.2, 0, Math.PI*2); ctx.fill();

            // Head circle.
            ctx.beginPath(); ctx.arc(headCx, headCy, headR, 0, Math.PI*2); ctx.fill();

            // Chef Hat (clouds + base) sits above the head/ears.
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(headCx - headR*0.5, headCy - headR*1.55, headR*0.55, 0, Math.PI*2);
            ctx.arc(headCx + headR*0.5, headCy - headR*1.55, headR*0.55, 0, Math.PI*2);
            ctx.arc(headCx,              headCy - headR*2.1,  headR*0.75, 0, Math.PI*2);
            ctx.fill();
            ctx.fillRect(headCx - headR*0.65, headCy - headR*1.35, headR*1.3, headR*0.5);

            // Eyes / X-eyes on game over.
            if (gameState === 'GAMEOVER') {
                ctx.fillStyle = '#2c3e50';
                ctx.font = `${Math.round(headR*0.5)}px "Press Start 2P"`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('x', headCx - headR*0.35, headCy - headR*0.05);
                ctx.fillText('x', headCx + headR*0.35, headCy - headR*0.05);
            } else {
                ctx.fillStyle = '#c0392b';
                ctx.beginPath(); ctx.arc(headCx - headR*0.35, headCy - headR*0.05, headR*0.13, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(headCx + headR*0.35, headCy - headR*0.05, headR*0.13, 0, Math.PI*2); ctx.fill();
            }

            // White snout (muzzle), with the nose sitting at the top of it.
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.ellipse(headCx, headCy + headR*0.45, headR*0.32, headR*0.22, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#c0392b';
            ctx.beginPath(); ctx.arc(headCx, headCy + headR*0.32, headR*0.13, 0, Math.PI*2); ctx.fill();
        }

        // ---- Goal plate: shape-aware horizontal strips ----
        // Lineage:
        //   v1 (pie wedges)          — visually fun but implied angle cuts.
        //   v2 (rectangular bar+text) — math homework, hard to map to food.
        //   v3 (strips on circle)    — visual+geometric, fixed angle-cut trap,
        //                              but only honest for round food. On a
        //                              triangle / cheese wedge / hexagon a
        //                              player who copied the plate's strip
        //                              boundary at "37% from top" got way off
        //                              from the [1/3, 2/3] target area
        //                              because non-circular foods don't have
        //                              uniform horizontal cross-section.
        //   v4 (this) — the plate adopts the *current dish's food shape*
        //               and divides THAT shape into horizontal strips of the
        //               right area. Now the plate is a literal preview: copy
        //               the divider position visually onto your food and
        //               you've made the right area split. The geometric
        //               estimation game is preserved (no numbers anywhere)
        //               but the per-shape correction work is done by the
        //               renderer rather than dumped on the player.
        const PLATE_PALETTE = [
            '#5dade2', '#f4d03f', '#58d68d', '#cd6155',
            '#bb8fce', '#f5b041', '#e8eaed'
        ];
        const PLATE_MAX_DIM = 110; // largest bbox dim of the rendered plate

        function _polyBBox(poly) {
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            for (const v of poly) {
                if (v.x < minX) minX = v.x; if (v.y < minY) minY = v.y;
                if (v.x > maxX) maxX = v.x; if (v.y > maxY) maxY = v.y;
            }
            return { minX, minY, maxX, maxY };
        }

        function _scalePolyToBox(poly, cx, cy, maxDim) {
            const b = _polyBBox(poly);
            const w = b.maxX - b.minX, h = b.maxY - b.minY;
            const s = maxDim / Math.max(w, h, 1);
            const ocx = (b.minX + b.maxX) / 2, ocy = (b.minY + b.maxY) / 2;
            return poly.map(v => ({
                x: cx + (v.x - ocx) * s,
                y: cy + (v.y - ocy) * s
            }));
        }

        // Find the horizontal y inside `poly` where the area ABOVE that y
        // (smaller-y side) equals targetArea. Bisection on splitPolygon().
        // splitPolygon's `right` is the side where (P.y - midY) < 0, i.e. above.
        function _findHorizCutY(poly, targetArea) {
            const b = _polyBBox(poly);
            let lo = b.minY, hi = b.maxY;
            for (let i = 0; i < 28; i++) {
                const midY = (lo + hi) / 2;
                const A = { x: b.minX - 1000, y: midY };
                const B = { x: b.maxX + 1000, y: midY };
                let topArea = 0;
                try {
                    const split = splitPolygon(poly, A, B);
                    if (split.right && split.right.length >= 3) topArea = getArea(split.right);
                } catch (_) {}
                if (topArea < targetArea) lo = midY; else hi = midY;
            }
            return (lo + hi) / 2;
        }

        // For convex `poly`, return the (sorted) x-coords where the horizontal
        // line y = yC intersects the polygon edges.
        function _polyHorizIntersect(poly, yC) {
            const xs = [];
            for (let i = 0; i < poly.length; i++) {
                const a = poly[i], b = poly[(i + 1) % poly.length];
                if (a.y === b.y) continue;
                if ((a.y <= yC && b.y >= yC) || (a.y >= yC && b.y <= yC)) {
                    const t = (yC - a.y) / (b.y - a.y);
                    xs.push(a.x + t * (b.x - a.x));
                }
            }
            xs.sort((a, b) => a - b);
            return xs;
        }

        // Cache scaled polygon + chord positions per (foodId, goals, cx, cy).
        // Recomputing every frame would do ~28 splitPolygon iterations per
        // chord; trivial in absolute terms but adds up at 60fps.
        const _plateCache = new Map();
        function _getPlateData(foodId, goals, cx, cy) {
            const key = foodId + '|' + goals.join(',') + '|' + cx + ',' + cy;
            let cached = _plateCache.get(key);
            if (cached) return cached;

            const rawPoly = createShape(foodId, 0, 0);
            const scaledPoly = _scalePolyToBox(rawPoly, cx, cy, PLATE_MAX_DIM);
            const scaledBBox = _polyBBox(scaledPoly);
            const totalArea = getArea(scaledPoly);

            const chords = [];
            let cum = 0;
            for (let i = 0; i < goals.length - 1; i++) {
                cum += goals[i];
                chords.push(_findHorizCutY(scaledPoly, cum * totalArea));
            }
            cached = { scaledPoly, scaledBBox, chords };
            _plateCache.set(key, cached);
            return cached;
        }

        function _tracePoly(poly) {
            ctx.beginPath();
            ctx.moveTo(poly[0].x, poly[0].y);
            for (let i = 1; i < poly.length; i++) ctx.lineTo(poly[i].x, poly[i].y);
            ctx.closePath();
        }

        function drawBabyPlate(cx, cy, goals, foodId) {
            // Header. Short label; the visual carries most of the meaning.
            ctx.fillStyle = '#ffffff';
            ctx.font = '8px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'alphabetic';
            ctx.fillText('MATCH THESE PIECE SIZES', cx, cy - PLATE_MAX_DIM / 2 - 14);

            // Fallback (no current dish yet): empty round plate.
            if (!foodId || !goals || goals.length === 0) {
                const r = 50;
                ctx.fillStyle = 'rgba(0,0,0,0.35)';
                ctx.beginPath(); ctx.arc(cx + 3, cy + 5, r, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#ecf0f1';
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#3498db'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
                return;
            }

            const { scaledPoly, scaledBBox, chords } = _getPlateData(foodId, goals, cx, cy);

            // Drop-shadow of the plate silhouette.
            ctx.save();
            ctx.translate(3, 5);
            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            _tracePoly(scaledPoly); ctx.fill();
            ctx.restore();

            // Plate base.
            ctx.fillStyle = '#ecf0f1';
            _tracePoly(scaledPoly); ctx.fill();

            // Colored strips, clipped to the plate's polygon silhouette.
            ctx.save();
            _tracePoly(scaledPoly); ctx.clip();

            let yTop = scaledBBox.minY - 2;
            const stripX = scaledBBox.minX - 5;
            const stripW = (scaledBBox.maxX - scaledBBox.minX) + 10;
            for (let i = 0; i < goals.length; i++) {
                const yBot = (i < goals.length - 1) ? chords[i] : (scaledBBox.maxY + 2);
                ctx.fillStyle = PLATE_PALETTE[i % PLATE_PALETTE.length];
                ctx.fillRect(stripX, yTop, stripW, yBot - yTop);
                yTop = yBot;
            }
            ctx.restore();

            // Chord dividers — drawn as the literal chord segments inside the
            // polygon so each divider stops cleanly at the plate's edge.
            ctx.strokeStyle = '#2c3e50';
            ctx.lineWidth = 2;
            for (const yC of chords) {
                const xs = _polyHorizIntersect(scaledPoly, yC);
                if (xs.length >= 2) {
                    ctx.beginPath();
                    ctx.moveTo(xs[0], yC);
                    ctx.lineTo(xs[xs.length - 1], yC);
                    ctx.stroke();
                }
            }

            // Outer rim on top so it sits above the strips.
            ctx.strokeStyle = '#3498db';
            ctx.lineWidth = 4;
            _tracePoly(scaledPoly); ctx.stroke();
        }

        function draw() {
            // Background Wooden Table
            ctx.fillStyle = '#2c1e16';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            if (gameState === 'START') return;

            // Draw goal proportions tray (replaces the old pie-wedge plate
            // which wrongly implied wedge / angle cuts were required).
            drawBabyPlate(
                GAME_WIDTH / 2, 120,
                currentLevel ? currentLevel.goals : [],
                currentLevel ? currentLevel.shape : null
            );

            // Draw Cutting Board
            ctx.fillStyle = '#d35400';
            const cbY = 220;
            const cbH = 340;
            // Rounded rect hack for retro canvas
            ctx.fillRect(20, cbY + 20, GAME_WIDTH - 40, cbH - 40);
            ctx.fillRect(40, cbY, GAME_WIDTH - 80, cbH);
            ctx.fillStyle = '#e67e22'; // Inner board
            ctx.fillRect(30, cbY + 20, GAME_WIDTH - 60, cbH - 40);
            ctx.fillRect(40, cbY + 10, GAME_WIDTH - 80, cbH - 20);

            // Draw Food Name on Cutting Board
            if (currentLevel) {
                const label = getFoodLabel(currentLevel.shape).toUpperCase();
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.font = '12px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.fillText(`- ${label} -`, GAME_WIDTH / 2 + 2, cbY + 37);
                ctx.fillStyle = '#ffffff';
                ctx.fillText(`- ${label} -`, GAME_WIDTH / 2, cbY + 35);
            }

            // Draw Bunny Chef at bottom
            drawBunnyChef(GAME_WIDTH / 2 - 30, GAME_HEIGHT - 100);

            // Draw Food Pieces
            pieces.forEach(p => {
                ctx.save();
                
                // 1. Create Clipping Path for the sliced piece
                ctx.beginPath();
                if(p.pts.length > 0) {
                    ctx.moveTo(p.pts[0].x, p.pts[0].y);
                    for (let i=1; i<p.pts.length; i++) ctx.lineTo(p.pts[i].x, p.pts[i].y);
                }
                ctx.closePath();
                ctx.clip(); // Restrict drawing to inside this piece

                // 2. Dispatch to the per-food texture renderer. Falls back to
                // a flat fill if the food id is unknown (defensive only — every
                // food in FOODS provides a draw fn).
                const food = FOODS[p.type];
                if (food && food.draw) {
                    food.draw(p);
                } else {
                    ctx.fillStyle = p.color || '#fff';
                    ctx.fillRect(p.cx-100, p.cy-100, 200, 200);
                }

                ctx.restore(); // Remove clipping

                // 3. Draw Cut Edge Outline
                ctx.beginPath();
                if(p.pts.length > 0) {
                    ctx.moveTo(p.pts[0].x, p.pts[0].y);
                    for (let i=1; i<p.pts.length; i++) ctx.lineTo(p.pts[i].x, p.pts[i].y);
                }
                ctx.closePath();
                ctx.lineWidth = 2;
                ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                ctx.stroke();
            });

            // Draw in-progress freeform swipe trail (raw sample path).
            if (isSwiping && swipePath.length > 1) {
                // Faint raw-path trail so the player sees what they actually drew.
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.55)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(swipePath[0].x, swipePath[0].y);
                for (let i = 1; i < swipePath.length; i++) {
                    ctx.lineTo(swipePath[i].x, swipePath[i].y);
                }
                ctx.stroke();

                // Bright simplified preview overlay — shows the cut shape that
                // will actually be applied. Bend points are emphasized with dots
                // so the player can see how many segments their swipe became.
                const preview = douglasPeucker(swipePath, SIMPLIFY_TOLERANCE);
                if (preview.length >= 2) {
                    ctx.strokeStyle = liveCutSegments > cutsLeft
                        ? 'rgba(255, 80, 80, 0.95)'      // red = too many cuts
                        : 'rgba(255, 255, 255, 0.95)';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(preview[0].x, preview[0].y);
                    for (let i = 1; i < preview.length; i++) ctx.lineTo(preview[i].x, preview[i].y);
                    ctx.stroke();

                    // Bend dots (skip the very first/last points).
                    if (preview.length > 2) {
                        ctx.fillStyle = 'rgba(255, 215, 0, 0.95)';
                        for (let i = 1; i < preview.length - 1; i++) {
                            ctx.beginPath();
                            ctx.arc(preview[i].x, preview[i].y, 5, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }

                    // Live cut-cost badge near the cursor.
                    const tip = preview[preview.length - 1];
                    const badge = `${liveCutSegments} CUT${liveCutSegments === 1 ? '' : 'S'}`;
                    ctx.font = '10px "Press Start 2P"';
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'middle';
                    const padX = 6, padY = 4;
                    const tw = ctx.measureText(badge).width;
                    const bx = tip.x + 12, by = tip.y - 14;
                    ctx.fillStyle = liveCutSegments > cutsLeft
                        ? 'rgba(180, 30, 30, 0.9)'
                        : 'rgba(20, 20, 20, 0.85)';
                    ctx.fillRect(bx - padX, by - 8 - padY, tw + padX*2, 16 + padY*2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(badge, bx, by);
                }
            }

            // Draw successful slash feedback (polyline-aware).
            if (slashTimer > 0 && slashPath && slashPath.length >= 2) {
                ctx.strokeStyle = `rgba(255, 255, 255, ${slashTimer / 300})`;
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.moveTo(slashPath[0].x, slashPath[0].y);
                for (let i = 1; i < slashPath.length; i++) ctx.lineTo(slashPath[i].x, slashPath[i].y);
                ctx.stroke();
            }

            // Evaluating Overlay
            if (gameState === 'EVALUATING') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                ctx.fillStyle = '#00FF00';
                ctx.font = '20px "Press Start 2P"';
                ctx.textAlign = 'center';
                
                // Blinking text
                if (Math.floor(performance.now() / 200) % 2 === 0) {
                    ctx.fillText('CHECKING FIT...', GAME_WIDTH / 2, GAME_HEIGHT / 2);
                }
            } else if (gameState === 'SUCCESS') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                ctx.fillStyle = '#2ecc71';
                ctx.font = '30px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.fillText('PERFECT!', GAME_WIDTH / 2, GAME_HEIGHT / 2);
                ctx.fillStyle = '#fff';
                ctx.font = '14px "Press Start 2P"';
                ctx.fillText('+100 PTS', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 40);
            }
        }

        let gameLoopRunning = false;

        function gameLoop(timestamp) {
            let dt = timestamp - lastTime;
            lastTime = timestamp;
            if (dt > 100 || dt < 0 || isNaN(dt)) dt = 16; 

            update(dt);
            draw();
            if (gameLoopRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        // Boot
        draw();

        if (urlParams.get('autoStart') === 'true') {
            initGame(true);
        }

        // ---- Test-only hotkeys (?test=true) ----
        // Lets browser-automation tools script cuts on the canvas without
        // simulating real touch events (the canvas has no a11y role and so
        // can't be targeted by the MCP browser_drag tool). Gated behind a URL
        // param so it has zero impact on production play. Cuts are placed
        // relative to the LARGEST current piece's axis-aligned bounding box.
        if (urlParams.get('test') === 'true') {
            function _largestPiece() {
                let best = null, bestArea = 0;
                for (const p of pieces) {
                    const a = getArea(p.pts);
                    if (a > bestArea) { bestArea = a; best = p; }
                }
                return best;
            }
            function _bbox(poly) {
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                for (const v of poly) {
                    if (v.x < minX) minX = v.x;
                    if (v.y < minY) minY = v.y;
                    if (v.x > maxX) maxX = v.x;
                    if (v.y > maxY) maxY = v.y;
                }
                return { minX, minY, maxX, maxY };
            }
            // Horizontal straight cut at fraction f (0..1) down the largest
            // piece's bbox. f=0.5 → bisect, f=0.33 → top third, etc.
            function _hCut(f) {
                const p = _largestPiece(); if (!p) return;
                const b = _bbox(p.pts);
                const y = b.minY + (b.maxY - b.minY) * f;
                processSwipe([
                    { x: b.minX - 5, y },
                    { x: b.maxX + 5, y }
                ]);
            }
            // Vertical straight cut at fraction f across the largest piece's bbox.
            function _vCut(f) {
                const p = _largestPiece(); if (!p) return;
                const b = _bbox(p.pts);
                const x = b.minX + (b.maxX - b.minX) * f;
                processSwipe([
                    { x, y: b.minY - 5 },
                    { x, y: b.maxY + 5 }
                ]);
            }
            window.addEventListener('keydown', (e) => {
                if (gameState !== 'PLAY') return;
                // Digit keys 1..9 → horizontal cut at f = N/10 of largest piece bbox.
                if (/^[1-9]$/.test(e.key)) { _hCut(parseInt(e.key) / 10); e.preventDefault(); return; }
                // Shift+1..9 → vertical cut at f = N/10.
                if (e.shiftKey && /^[!@#$%^&*(]$/.test(e.key)) {
                    const map = { '!':1, '@':2, '#':3, '$':4, '%':5, '^':6, '&':7, '*':8, '(':9 };
                    _vCut(map[e.key] / 10); e.preventDefault(); return;
                }
                switch (e.key) {
                    case 'p': platePresent(); e.preventDefault(); break;
                    // 'g' (goal) → cut at the area-correct chord position the
                    // plate is currently displaying for the *current food*.
                    // Lets us verify the shape-aware plate is mathematically
                    // self-consistent: if 'g' always passes the level, the
                    // visualization is honest and a player who copies it
                    // visually will always succeed.
                    case 'g': {
                        const piece = _largestPiece(); if (!piece) break;
                        const goals = currentLevel ? currentLevel.goals : null;
                        if (!goals || goals.length < 2) break;
                        // Compute first-chord position on the *food* polygon
                        // directly (same algorithm as the plate, just at full
                        // food scale instead of plate scale).
                        const total = getArea(piece.pts);
                        const yChord = _findHorizCutY(piece.pts, goals[0] * total);
                        const b = _bbox(piece.pts);
                        processSwipe([
                            { x: b.minX - 5, y: yChord },
                            { x: b.maxX + 5, y: yChord }
                        ]);
                        e.preventDefault();
                        break;
                    }
                }
            });
        }

    </script>
</body>
