<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tiny Chef Arcade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            touch-action: none;
            font-family: 'Press Start 2P', monospace;
            -webkit-user-select: none;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            background: #2c1e16; /* Dark wood */
            box-shadow: 0 0 30px rgba(255, 150, 50, 0.15);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .scanlines {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.25) 50%,
                rgba(0,0,0,0.25)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        .crt-flicker {
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.95; }
            50% { opacity: 1; }
            100% { opacity: 0.95; }
        }

        .text-glow {
            text-shadow: 2px 2px 0px #d35400, -1px -1px 0px #f1c40f;
        }
        
        .alert-glow {
            text-shadow: 3px 3px 0px #c0392b, -2px -2px 0px #e74c3c;
            animation: pulse-red 0.5s infinite alternate;
        }

        @keyframes pulse-red {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
        
        .success-glow {
            text-shadow: 2px 2px 0px #27ae60, -1px -1px 0px #2ecc71;
        }

        .star { color: #555; font-size: 26px; text-shadow: 1px 1px 0 #000; transition: all 0.3s; }
        .star.earned { color: #f1c40f; text-shadow: 1px 1px 0 #d35400; animation: pop 0.3s ease-out; }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); }
            100% { transform: scale(1); }
        }

        /* Swipe surface overlay */
        #swipe-surface {
            position: absolute;
            inset: 0;
            z-index: 10;
            cursor: crosshair;
        }

        /* Plate-It! button — soft early-submit. Pulses green when the current
           pieces already match the goal pattern within tolerance, signalling
           "you can submit now without burning your remaining cuts". */
        #plate-btn {
            transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
        }
        #plate-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
            animation: none !important;
        }
        #plate-btn.plate-ready {
            box-shadow: 0 0 14px rgba(46, 204, 113, 0.95),
                        0 0 28px rgba(46, 204, 113, 0.55);
            animation: plate-pulse 0.55s infinite alternate ease-in-out;
        }
        @keyframes plate-pulse {
            from { transform: scale(1); }
            to   { transform: scale(1.07); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="game-container" class="crt-flicker">
        <canvas id="gameCanvas"></canvas>
        <div class="scanlines"></div>
        <div id="swipe-surface"></div>

        <!-- HUD -->
        <div id="hud" class="absolute top-0 left-0 w-full p-4 flex justify-between items-start z-20 text-white text-[10px] sm:text-xs tracking-wider pointer-events-none">
            <button id="hud-exit-btn" class="absolute top-2 left-2 bg-red-500/80 hover:bg-red-600 text-white rounded-full w-8 h-8 flex items-center justify-center pointer-events-auto border-2 border-white font-bold z-[30] pb-1">&times;</button>
            <div class="flex flex-col gap-2 relative ml-10">
                <div>SCORE: <span id="score-display" class="text-green-400">0</span></div>
                <div id="timer-container" class="text-white bg-black/60 px-2 py-1.5 flex items-center gap-1 rounded mt-1 border border-red-500/50 pointer-events-auto">
                    <svg class="w-3 h-3 text-red-500 animate-pulse shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    <span id="time-display" class="text-red-400 font-bold tracking-widest text-[12px]">60.0</span><span class="text-[8px] text-zinc-400 ml-0.5">S</span>
                </div>
            </div>
            <div class="text-right flex flex-col gap-2 relative pointer-events-none items-end">
                <div id="star-container" class="flex gap-1 justify-end mb-1">
                    <span id="star-1" class="star">★</span>
                    <span id="star-2" class="star">★</span>
                    <span id="star-3" class="star">★</span>
                </div>
                <div class="mt-2 text-right pointer-events-none">CUTS LEFT:<br><span id="cuts-display" class="text-red-400 text-lg">0</span></div>
                <button id="plate-btn" disabled class="mt-2 bg-green-600 hover:bg-green-500 text-white border-2 border-white rounded text-[9px] sm:text-[10px] px-3 py-2 uppercase tracking-wider pointer-events-auto cursor-pointer">
                    Plate It!
                </button>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center z-30 p-4 text-center">
            <h1 class="text-3xl sm:text-4xl text-white mb-8 text-glow leading-loose">TINY<br>CHEF</h1>
            <p class="text-gray-300 text-[10px] sm:text-xs mb-8 leading-loose uppercase">
                Swipe to cut the food.<br>
                Eyeball the colored portions<br>
                on the plate and match them.<br>
                Bend swipes for angle cuts<br>
                (each segment uses one cut).<br>
                Tap Plate It! when ready.
            </p>
            <div class="flex flex-col gap-4">
                <button id="start-btn" class="bg-orange-600 hover:bg-orange-500 text-white border-4 border-white px-6 py-4 rounded text-sm uppercase animate-pulse cursor-pointer shadow-[4px_4px_0_0_#fff] active:shadow-none active:translate-y-1 transition-all">
                    Insert Coin
                </button>
                <button id="start-exit-btn" class="bg-transparent text-gray-300 hover:text-white border-2 border-gray-400 hover:border-white px-4 py-2 rounded text-xs uppercase cursor-pointer transition-colors">
                    Back
                </button>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="absolute inset-0 bg-red-900/90 flex flex-col items-center justify-center z-30 hidden p-4 text-center">
            <h1 class="text-4xl text-white mb-4 alert-glow">TIME'S UP!</h1>
            <p id="game-over-reason" class="text-white text-xs mb-6 uppercase tracking-wider">Service is over!</p>
            <div id="final-stars-display" class="flex gap-2 mb-6">
                <span class="star empty text-5xl drop-shadow-lg">★</span>
                <span class="star empty text-5xl drop-shadow-lg transform -translate-y-2">★</span>
                <span class="star empty text-5xl drop-shadow-lg">★</span>
            </div>
            <p class="text-white text-sm mb-6 font-bold">SCORE: <span id="final-score" class="text-yellow-300">0</span></p>
            <div class="flex flex-col gap-4 w-full max-w-[200px] mx-auto">
                <button id="restart-btn" class="bg-white text-black hover:bg-gray-200 border-4 border-black px-6 py-4 rounded text-sm uppercase cursor-pointer shadow-[4px_4px_0_0_#000] active:shadow-none active:translate-y-1 transition-all">
                    Play Again
                </button>
                <button id="next-level-btn" class="hidden bg-green-500 hover:bg-green-400 text-white border-4 border-white px-6 py-4 rounded text-sm uppercase cursor-pointer shadow-[4px_4px_0_0_#fff] active:shadow-none active:translate-y-1 transition-all">
                    Next Level
                </button>
                <button id="exit-btn" class="bg-transparent text-gray-300 hover:text-white border-2 border-gray-400 hover:border-white px-4 py-2 rounded text-xs uppercase cursor-pointer transition-colors">
                    Save & Exit
                </button>
            </div>
        </div>
        
        <!-- Next Level Screen -->
        <div id="next-level-screen" class="absolute inset-0 bg-green-900/90 flex flex-col items-center justify-center z-30 hidden p-4 text-center">
            <h1 class="text-3xl text-white mb-4 success-glow">PERFECT FIT!</h1>
            <button id="next-btn" class="bg-white text-black hover:bg-gray-200 border-4 border-black px-6 py-4 rounded text-sm uppercase cursor-pointer shadow-[4px_4px_0_0_#000] active:shadow-none active:translate-y-1 transition-all">
                Next Dish
            </button>
        </div>
    </div>

    <script>
        // --- Setup ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const swipeSurface = document.getElementById('swipe-surface');
        
        const GAME_WIDTH = 400;
        const GAME_HEIGHT = 700;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;

        // UI Elements
        const scoreEl = document.getElementById('score-display');
        const levelEl = document.getElementById('level-display');
        const cutsEl = document.getElementById('cuts-display');
        
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const nextLevelScreen = document.getElementById('next-level-screen');

        // Game State
        const urlParams = new URLSearchParams(window.location.search);
        const GAME_ID = 'tiny_chef';
        // Per SCORING_GUIDE.md §6: clamp 1..5; reject 0/negative/non-numeric.
        const rawLevel = parseInt(urlParams.get('level'));
        const currentLevelIndex = Math.min(5, Math.max(1, isNaN(rawLevel) ? 1 : rawLevel));

        let gameState = 'START'; // START, PLAY, EVALUATING, GAMEOVER
        let score = 0;
        let dishesCompleted = 0;
        let totalErrors = 0;
        let lastTime = 0;
        let resultPosted = false;
        
        // Slicing State — supports multi-segment freeform swipes (angle cuts).
        // The full pointer path is sampled into `swipePath` during the drag and
        // simplified with Douglas-Peucker on release. The number of straight
        // segments after simplification = number of cuts the swipe consumes.
        let isSwiping = false;
        let swipePath = [];          // raw sampled pointer positions
        let lastSampleAt = 0;
        let liveCutSegments = 0;     // updated during drag for the HUD preview
        let slashPath = null;        // simplified+extended polyline of last successful cut
        let slashTimer = 0;
        // Min squared distance between consecutive samples (cuts down on noise).
        const SAMPLE_MIN_DIST_SQ = 4 * 4;
        // Douglas-Peucker tolerance (px). Anything below this is considered noise.
        const SIMPLIFY_TOLERANCE = 8;
        // How far past the swipe endpoints to extend the cut line. Lets the
        // player swipe entirely *inside* the food and still cut clean through.
        const CUT_EXTEND_PX = 2000;
        
        // Level Data
        let currentLevel = null;
        let cutsLeft = 0;
        let pieces = [];
        let initialArea = 0;

        let timeLeft = 60000;

        // Per MINIGAMES_GUIDE.md §5 Tiny Chef: pass = ≤8% error, 2★ = ≤5%, 3★ = ≤2%.
        const ERROR_TOLERANCE = 0.08;
        const TWO_STAR_TOLERANCE = 0.05;
        const THREE_STAR_TOLERANCE = 0.02;

        // Canonical score (SCORING_GUIDE.md §3): dishes*100 + bonus(stars).
        function starBonus(stars) {
            return (stars || 0) * 50;
        }
        function canonicalScore(stars) {
            return dishesCompleted * 100 + starBonus(stars || 0);
        }
        function previewStarsFromErrors() {
            if (dishesCompleted === 0) return 0;
            const avg = totalErrors / dishesCompleted;
            if (avg <= THREE_STAR_TOLERANCE) return 3;
            if (avg <= TWO_STAR_TOLERANCE) return 2;
            return 1;
        }
        function updateLiveStars() {
            const live = previewStarsFromErrors();
            for (let i = 1; i <= 3; i++) {
                const el = document.getElementById('star-' + i);
                if (!el) continue;
                el.className = 'star' + (i <= live ? ' earned' : '');
            }
        }
        function postResult(stars, outcome) {
            if (resultPosted) return;
            resultPosted = true;
            const finalScore = canonicalScore(stars);
            window.parent.postMessage({
                type: 'LEVEL_RESULT',
                gameId: GAME_ID,
                level: currentLevelIndex,
                stars: stars,
                score: finalScore,
                outcome: outcome
            }, '*');
        }

        // Per-level dish recipe (goals + cuts) — the actual food assigned to each
        // dish slot is drawn at random from the FOODS library on every fresh game,
        // so a player never sees the same series of foods twice in a row.
        //
        // Dish counts per level are unchanged (L1=2, L2=3, L3=2, L4=3, L5=4) so
        // the canonical score curve from §3 is preserved. The variety lives in
        // the *goal fractions* and *cut counts*: every level mixes at least two
        // cut patterns, and intricate fractions (1/3, 1/6, 3/8, 0.3, etc.) push
        // the player past lazy bisection.
        const SERVICES = [
            // Level 1 — Warm-up: one symmetric halving, one asymmetric 1-cut.
            [
                { goals: [0.5, 0.5], cuts: 1 },                 // straight halves
                { goals: [1/3, 2/3], cuts: 1 }                  // eyeball a third
            ],
            // Level 2 — Mixed cuts: 1-cut and 2-cut dishes side by side.
            [
                { goals: [0.25, 0.75], cuts: 1 },               // asymmetric single cut
                { goals: [0.5, 0.25, 0.25], cuts: 2 },          // halve, then halve a half
                { goals: [1/3, 1/3, 1/3], cuts: 2 }             // parallel cuts for thirds
            ],
            // Level 3 — Intricate 2-cut: no plain halves anywhere.
            [
                { goals: [0.25, 0.25, 0.25, 0.25], cuts: 2 },   // quarters via cross-cut
                { goals: [3/8, 3/8, 1/4], cuts: 2 }             // off-center pair
            ],
            // Level 4 — Fancy patterns: chained 3-cut work appears.
            [
                { goals: [0.5, 0.25, 0.125, 0.125], cuts: 3 },  // recursive bisect chain
                { goals: [1/6, 1/3, 1/2], cuts: 2 },            // sixth + third + half
                { goals: [0.2, 0.3, 0.5], cuts: 2 }             // uneven 20/30/50
            ],
            // Level 5 — Gauntlet: every dish is intricate, no repeats.
            [
                { goals: [0.125, 0.125, 0.25, 0.5], cuts: 3 },  // progressive halving
                { goals: [1/6, 1/3, 1/3, 1/6], cuts: 3 },       // mirrored sixths + thirds
                { goals: [3/8, 1/8, 1/4, 1/4], cuts: 3 },       // mixed eighths + quarters
                { goals: [0.4, 0.3, 0.2, 0.1], cuts: 3 }        // descending ladder
            ]
        ];
        const currentService = SERVICES[Math.min(currentLevelIndex - 1, 4)];

        // Persistent food rotation — backed by localStorage so the cycle survives
        // every iframe reload (each level transition + Play Again + Try Again all
        // reload this iframe). The player only ever sees a repeat AFTER they've
        // cycled through every food in FOODS.
        const FOOD_CYCLE_KEY = 'tinyChefFoodCycle_v1';

        function loadCycle() {
            try {
                const raw = localStorage.getItem(FOOD_CYCLE_KEY);
                if (!raw) return null;
                const c = JSON.parse(raw);
                if (!Array.isArray(c.pool) || typeof c.idx !== 'number') return null;
                // Defensive: drop the rotation if any stored id has since been
                // removed/renamed in FOODS.
                for (const id of c.pool) if (!FOODS[id]) return null;
                return c;
            } catch (e) {
                return null;
            }
        }

        function saveCycle(cycle) {
            try {
                localStorage.setItem(FOOD_CYCLE_KEY, JSON.stringify(cycle));
            } catch (e) { /* storage disabled — fall back to in-memory only */ }
        }

        function createCycle(avoidId) {
            const ids = Object.keys(FOODS).slice();
            // Fisher-Yates shuffle.
            for (let i = ids.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [ids[i], ids[j]] = [ids[j], ids[i]];
            }
            // Avoid rolling the just-seen food into the first slot of the new
            // cycle (otherwise the player can see the same food twice in a row
            // when one rotation ends and the next begins).
            if (avoidId && ids[0] === avoidId && ids.length > 1) {
                [ids[0], ids[1]] = [ids[1], ids[0]];
            }
            return { pool: ids, idx: 0 };
        }

        function pickNextFood() {
            let cycle = loadCycle();
            let lastSeen = null;
            if (cycle && cycle.idx >= cycle.pool.length) {
                // Rotation exhausted — remember the last-seen food and start a
                // fresh shuffled cycle.
                lastSeen = cycle.pool[cycle.pool.length - 1];
                cycle = null;
            }
            if (!cycle) cycle = createCycle(lastSeen);
            const id = cycle.pool[cycle.idx];
            cycle.idx++;
            saveCycle(cycle);
            return id;
        }

        // --- Math & Geometry Functions ---

        // Get polygon area
        function getArea(pts) {
            let area = 0;
            for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
                area += (pts[j].x + pts[i].x) * (pts[j].y - pts[i].y);
            }
            return Math.abs(area / 2);
        }

        // Line intersection
        function lineIntersect(A, B, C, D) {
            const denom = (D.y - C.y)*(B.x - A.x) - (D.x - C.x)*(B.y - A.y);
            if (denom === 0) return null;
            const ua = ((D.x - C.x)*(A.y - C.y) - (D.y - C.y)*(A.x - C.x)) / denom;
            const ub = ((B.x - A.x)*(A.y - C.y) - (B.y - A.y)*(A.x - C.x)) / denom;
            if (ua >= 0 && ua <= 1 && ub >= 0 && ub <= 1) {
                return { x: A.x + ua*(B.x - A.x), y: A.y + ua*(B.y - A.y) };
            }
            return null;
        }

        // Infinite line intersect with segment
        function getLineSegmentIntersect(A, B, C, D) {
            const a1 = B.y - A.y;
            const b1 = A.x - B.x;
            const c1 = a1*A.x + b1*A.y;

            const a2 = D.y - C.y;
            const b2 = C.x - D.x;
            const c2 = a2*C.x + b2*C.y;

            const det = a1*b2 - a2*b1;
            if (det === 0) return null;
            const x = (b2*c1 - b1*c2)/det;
            const y = (a1*c2 - a2*c1)/det;

            // Check if point is on segment C-D
            const rx = Math.abs(D.x - C.x) > 0.001 ? (x - C.x) / (D.x - C.x) : -1;
            const ry = Math.abs(D.y - C.y) > 0.001 ? (y - C.y) / (D.y - C.y) : -1;
            const t = Math.abs(D.x - C.x) > Math.abs(D.y - C.y) ? rx : ry;
            
            if (t >= -0.001 && t <= 1.001) return {x, y};
            return null;
        }

        function countIntersections(A, B, poly) {
            let count = 0;
            for (let i = 0; i < poly.length; i++) {
                const P1 = poly[i];
                const P2 = poly[(i+1)%poly.length];
                if (lineIntersect(A, B, P1, P2)) count++;
            }
            return count;
        }

        // ---------- Polyline cut helpers ----------
        // The angle-cut system treats each swipe as a polyline (1+ straight
        // segments). The polyline carves the polygon along its actual shape:
        // each pair of (entry, exit) intersections with the polygon boundary
        // defines a "strand" that splits one polygon into two. Subsequent
        // strands recurse on the resulting sub-polygons. The algorithm works
        // on simple polygons (convex OR non-convex), so post-cut wedges can
        // themselves be cut by later swipes without breaking.

        function polylineLength(path) {
            let total = 0;
            for (let i = 1; i < path.length; i++) {
                total += Math.hypot(path[i].x - path[i-1].x, path[i].y - path[i-1].y);
            }
            return total;
        }

        // Perpendicular distance from point P to the infinite line through A-B.
        function perpDistance(P, A, B) {
            const dy = B.y - A.y, dx = B.x - A.x;
            const num = Math.abs(dy * P.x - dx * P.y + B.x * A.y - B.y * A.x);
            const den = Math.hypot(dy, dx);
            if (den === 0) return Math.hypot(P.x - A.x, P.y - A.y);
            return num / den;
        }

        // Douglas-Peucker simplification — drops sample points within `eps`
        // of the chord, so finger jitter doesn't register as bend points.
        function douglasPeucker(points, eps) {
            if (points.length < 3) return points.slice();
            let maxD = 0, idx = 0;
            const a = points[0], b = points[points.length - 1];
            for (let i = 1; i < points.length - 1; i++) {
                const d = perpDistance(points[i], a, b);
                if (d > maxD) { maxD = d; idx = i; }
            }
            if (maxD > eps) {
                const left  = douglasPeucker(points.slice(0, idx + 1), eps);
                const right = douglasPeucker(points.slice(idx), eps);
                return left.slice(0, -1).concat(right);
            }
            return [a, b];
        }

        // Extend the FIRST and LAST segments of a polyline outward by `dist`,
        // so the player can swipe entirely inside the food and still cut clean
        // through. Internal vertices (bend points) are unchanged.
        function extendPolylineEnds(line, dist) {
            if (line.length < 2) return line.slice();
            const out = line.map(p => ({ x: p.x, y: p.y }));
            const a0 = out[0], b0 = out[1];
            const len0 = Math.hypot(b0.x - a0.x, b0.y - a0.y);
            if (len0 > 0.01) {
                out[0] = { x: a0.x - (b0.x - a0.x) / len0 * dist,
                           y: a0.y - (b0.y - a0.y) / len0 * dist };
            }
            const aN = out[out.length - 2], bN = out[out.length - 1];
            const lenN = Math.hypot(bN.x - aN.x, bN.y - aN.y);
            if (lenN > 0.01) {
                out[out.length - 1] = { x: bN.x + (bN.x - aN.x) / lenN * dist,
                                        y: bN.y + (bN.y - aN.y) / lenN * dist };
            }
            return out;
        }

        // Ray-casting point-in-polygon (works on simple non-convex polys).
        function pointInPolygon(p, poly) {
            let inside = false;
            for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
                const a = poly[i], b = poly[j];
                if (((a.y > p.y) !== (b.y > p.y)) &&
                    (p.x < (b.x - a.x) * (p.y - a.y) / ((b.y - a.y) || 1e-12) + a.x)) {
                    inside = !inside;
                }
            }
            return inside;
        }

        // Segment-segment intersection. Returns { pt, t, u } on success where
        // t is the param along A-B and u along C-D, both in [0,1]. Null on no hit.
        function segSegIntersect(A, B, C, D) {
            const denom = (B.x - A.x) * (D.y - C.y) - (B.y - A.y) * (D.x - C.x);
            if (Math.abs(denom) < 1e-9) return null;
            const t = ((C.x - A.x) * (D.y - C.y) - (C.y - A.y) * (D.x - C.x)) / denom;
            const u = ((C.x - A.x) * (B.y - A.y) - (C.y - A.y) * (B.x - A.x)) / denom;
            const EPS = 1e-7;
            if (t < -EPS || t > 1 + EPS || u < -EPS || u > 1 + EPS) return null;
            return {
                pt: { x: A.x + t * (B.x - A.x), y: A.y + t * (B.y - A.y) },

        // Compute every intersection between `line` (polyline) and `poly`
        // boundary, sorted along the line in swipe order.
        function computeLinePolyEvents(line, poly) {
            const events = [];
            for (let li = 0; li < line.length - 1; li++) {
                const a = line[li], b = line[li + 1];
                const segEvents = [];
                for (let pi = 0; pi < poly.length; pi++) {
                    const c = poly[pi], d = poly[(pi + 1) % poly.length];
                    const isect = segSegIntersect(a, b, c, d);
                    if (isect) segEvents.push({
                        pt: isect.pt, lineSeg: li, lineT: isect.t, polyEdge: pi
                    });
                }
                segEvents.sort((x, y) => x.lineT - y.lineT);
                for (const ev of segEvents) events.push(ev);
            }
            // Merge near-duplicate events (e.g., line crossing exactly through a
            // polygon vertex registers on both adjacent edges).
            const merged = [];
            for (const ev of events) {
                const last = merged[merged.length - 1];
                if (last && Math.hypot(last.pt.x - ev.pt.x, last.pt.y - ev.pt.y) < 0.5) continue;
                merged.push(ev);

        // Split a simple polygon `poly` along an inside path (entry → bends → exit).
        // entry/exit are events with .polyEdge telling us which polygon edge each
        // endpoint sits on. Returns [leftPoly, rightPoly] — both simple polygons.
        function splitPolygonAlongStrand(poly, entry, exit, insidePath) {
            const n = poly.length;
            // Side A: insidePath forward, then walk polygon CCW from after exit.polyEdge
            // back around to entry.polyEdge end (not inclusive of next vertex).
            const polyA = insidePath.slice();
            let i = (exit.polyEdge + 1) % n;
            const stopA = (entry.polyEdge + 1) % n;
            // Safety bound to avoid infinite loops on malformed input.
            let guard = n + 1;
            while (i !== stopA && guard-- > 0) {
                polyA.push({ x: poly[i].x, y: poly[i].y });
                i = (i + 1) % n;
            }
            // Side B: reversed insidePath, then walk polygon CCW from after
            // entry.polyEdge back around to exit.polyEdge end.
            const polyB = insidePath.slice().reverse();
            let j = (entry.polyEdge + 1) % n;
            const stopB = (exit.polyEdge + 1) % n;
            guard = n + 1;
            while (j !== stopB && guard-- > 0) {
                polyB.push({ x: poly[j].x, y: poly[j].y });

        // Recursive polyline clip. Returns an array of resulting sub-polygons.
        // If the line doesn't cleanly cut the polygon (0 events, odd events),
        // returns [poly] unchanged.
        function clipPolygonByPolyline(poly, line) {
            const events = computeLinePolyEvents(line, poly);
            if (events.length < 2) return [poly];
            // Odd events = swipe endpoint sat exactly on the boundary. Drop the
            // last event so we still get clean strands.
            const usable = events.length % 2 === 0
                ? events
                : events.slice(0, events.length - 1);

            const entry = usable[0];
            const exit  = usable[1];

            // Build inside path for this first strand.
            const insidePath = [{ x: entry.pt.x, y: entry.pt.y }];
            for (let i = entry.lineSeg + 1; i <= exit.lineSeg; i++) {
                insidePath.push({ x: line[i].x, y: line[i].y });
            }
            insidePath.push({ x: exit.pt.x, y: exit.pt.y });

            // Degenerate strand (entry == exit) — skip this strand and recurse
            // with the rest of the line on the unchanged polygon.
            const strandLen = polylineLength(insidePath);
            if (strandLen < 0.5) {
                if (usable.length <= 2) return [poly];
                const rest = [exit.pt].concat(line.slice(exit.lineSeg + 1));
                return clipPolygonByPolyline(poly, rest);
            }

            const [polyA, polyB] = splitPolygonAlongStrand(poly, entry, exit, insidePath);

            // Remaining line for further strands: from exit point onward.
            if (usable.length <= 2) return [polyA, polyB];

            const rest = [exit.pt].concat(line.slice(exit.lineSeg + 1));
            // Future strands lie entirely in either polyA or polyB. Clip each
            // recursively; the one that doesn't contain the next strand simply

            for (let i = 0; i < poly.length; i++) {
                const P1 = poly[i];
                const P2 = poly[(i+1)%poly.length];
                
                const side1 = (B.x - A.x)*(P1.y - A.y) - (B.y - A.y)*(P1.x - A.x);
                const side2 = (B.x - A.x)*(P2.y - A.y) - (B.y - A.y)*(P2.x - A.x);

                if (side1 >= -0.01) leftPoly.push(P1);

                if ((side1 > 0 && side2 < 0) || (side1 < 0 && side2 > 0)) {
                    const intP = getLineSegmentIntersect(A, B, P1, P2);

                        rightPoly.push(intP);

            ctx.fillStyle = '#7b5e2c';
            for (let i = 0; i < 10; i++) {
                const a = (i/10) * Math.PI * 2 + 0.3;
                ctx.fillRect(p.cx + Math.cos(a)*45, p.cy + Math.sin(a)*45, 2, 2);
            }
        }
        function drawTexSushi(p) {
            ctx.fillStyle = '#1b2a1f';
            ctx.fillRect(p.cx-100, p.cy-100, 200, 200);
            ctx.fillStyle = '#fafafa';
            ctx.beginPath(); ctx.arc(p.cx, p.cy, 60, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#e8e3d3';
            for (let i = 0; i < 24; i++) {
                const a = (i/24) * Math.PI * 2;
                const r = 35 + (i%2)*10;
                ctx.fillRect(p.cx + Math.cos(a)*r, p.cy + Math.sin(a)*r, 3, 5);
            }
            ctx.fillStyle = '#e67e22';
            ctx.beginPath(); ctx.arc(p.cx, p.cy, 18, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#7dcea0';
            ctx.beginPath(); ctx.ellipse(p.cx, p.cy, 16, 6, Math.PI/4, 0, Math.PI*2); ctx.fill();
        }
        function drawTexWaffle(p) {
            ctx.fillStyle = '#a67c52';
            ctx.fillRect(p.cx-100, p.cy-100, 200, 200);
            ctx.fillStyle = '#e6b167';
            ctx.fillRect(p.cx-75, p.cy-75, 150, 150);
            ctx.fillStyle = '#9c7c4e';
            for (let i = -3; i <= 3; i++) {
                ctx.fillRect(p.cx + i*22 - 1, p.cy-80, 3, 160);
                ctx.fillRect(p.cx-80, p.cy + i*22 - 1, 160, 3);
            }
            ctx.fillStyle = '#f4d6a3';
            for (let i = -2; i <= 2; i++) {
                for (let j = -2; j <= 2; j++) {
                    ctx.fillRect(p.cx + i*22 - 8, p.cy + j*22 - 8, 16, 16);
                }
            }
        }
        function drawTexPancake(p) {
            ctx.fillStyle = '#a67c52';
            ctx.fillRect(p.cx-100, p.cy-100, 200, 200);
            ctx.fillStyle = '#f1c27d';
            ctx.beginPath(); ctx.arc(p.cx, p.cy, 78, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#dfa063';
            ctx.beginPath(); ctx.arc(p.cx, p.cy-3, 72, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#7b3f00';
            ctx.beginPath();
            ctx.moveTo(p.cx-30, p.cy-30);
            ctx.bezierCurveTo(p.cx-50, p.cy-10, p.cx-25, p.cy+20, p.cx, p.cy+25);
            ctx.bezierCurveTo(p.cx+30, p.cy+30, p.cx+45, p.cy+5, p.cx+25, p.cy-15);
            ctx.bezierCurveTo(p.cx+10, p.cy-35, p.cx-20, p.cy-30, p.cx-30, p.cy-30);
            ctx.fill();
            ctx.fillStyle = '#f9e79f';
            ctx.fillRect(p.cx-12, p.cy-15, 24, 12);
            ctx.fillStyle = '#f4d03f';

        }
        function drawTexPepper(p) {
            ctx.fillStyle = '#1e8449';
            ctx.fillRect(p.cx-100, p.cy-100, 200, 200);
            ctx.fillStyle = '#abebc6';
            ctx.beginPath(); ctx.arc(p.cx, p.cy, 65, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#f4ecc2';
            for (let i = 0; i < 3; i++) {
                const a = -Math.PI/2 + i*(2*Math.PI/3);
                ctx.beginPath();
                ctx.moveTo(p.cx, p.cy);
                ctx.lineTo(p.cx + Math.cos(a)*60, p.cy + Math.sin(a)*60);
                ctx.lineTo(p.cx + Math.cos(a + 0.4)*40, p.cy + Math.sin(a + 0.4)*40);
                ctx.closePath(); ctx.fill();
            }
            ctx.fillStyle = '#fef5e7';
            for (let i = 0; i < 10; i++) {
                const a = (i/10) * Math.PI * 2;

        }
        function drawTexChocolate(p) {
            ctx.fillStyle = '#3a1d0e';
            ctx.fillRect(p.cx-100, p.cy-100, 200, 200);
            ctx.fillStyle = '#6b4226';

            ctx.fillStyle = '#8b5a2b';
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 4; j++) {

                }
            }
            ctx.fillStyle = '#a87850';
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 4; j++) {

        function drawTexAvocado(p) {
            ctx.fillStyle = '#3e2c0a';
            ctx.fillRect(p.cx-100, p.cy-100, 200, 200);
            ctx.fillStyle = '#aacc83';
            ctx.beginPath(); ctx.ellipse(p.cx, p.cy, 50, 80, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#dee9a3';
            ctx.beginPath(); ctx.ellipse(p.cx, p.cy, 38, 65, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#5d4037';
            ctx.beginPath(); ctx.arc(p.cx, p.cy, 22, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#7b5e2c';

        }
        function drawTexEgg(p) {
            ctx.fillStyle = '#e5e7e9';
            ctx.fillRect(p.cx-100, p.cy-100, 200, 200);
            ctx.fillStyle = '#fafafa';
            ctx.beginPath(); ctx.ellipse(p.cx, p.cy, 70, 85, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath(); ctx.arc(p.cx, p.cy-5, 28, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#f9e79f';
            ctx.beginPath(); ctx.arc(p.cx-8, p.cy-12, 8, 0, Math.PI*2); ctx.fill();
        }

        // --- Food Library ---
        // 24 distinct foods. Each has a convex polygon outline (so cuts split
        // cleanly) plus its own texture renderer. See SCORING_GUIDE.md migration log.
        const FOODS = {
            orange:     { label: 'Orange',     color: '#f39c12', shape: (cx, cy) => polyCircle(cx, cy, 80),         draw: drawTexOrange },
            watermelon: { label: 'Watermelon', color: '#e74c3c', shape: (cx, cy) => [{x:cx,y:cy-80},{x:cx+80,y:cy+60},{x:cx-80,y:cy+60}], draw: drawTexWatermelon },

            pie:        { label: 'Pie',        color: '#d4a373', shape: (cx, cy) => polyCircle(cx, cy, 80),         draw: drawTexPie },
            kiwi:       { label: 'Kiwi',       color: '#8aaa3a', shape: (cx, cy) => polyCircle(cx, cy, 75),         draw: drawTexKiwi },
            lemon:      { label: 'Lemon',      color: '#f7dc6f', shape: (cx, cy) => polyEllipse(cx, cy, 65, 85),    draw: drawTexLemon },
            mushroom:   { label: 'Mushroom',   color: '#c0392b', shape: (cx, cy) => polyEllipse(cx, cy, 75, 90),    draw: drawTexMushroom },
            strawberry: { label: 'Strawberry', color: '#e74c3c', shape: (cx, cy) => polyTriDown(cx, cy, 130, 150),  draw: drawTexStrawberry },
            donut:      { label: 'Donut',      color: '#f5b7b1', shape: (cx, cy) => polyCircle(cx, cy, 80),         draw: drawTexDonut },
            cookie:     { label: 'Cookie',     color: '#c68e60', shape: (cx, cy) => polyCircle(cx, cy, 75),         draw: drawTexCookie },
            sushi:      { label: 'Sushi Roll', color: '#1b2a1f', shape: (cx, cy) => polyCircle(cx, cy, 70),         draw: drawTexSushi },
            waffle:     { label: 'Waffle',     color: '#d2a25f', shape: (cx, cy) => polyRect(cx, cy, 160, 160),     draw: drawTexWaffle },
            pancake:    { label: 'Pancake',    color: '#f1c27d', shape: (cx, cy) => polyCircle(cx, cy, 85),         draw: drawTexPancake },
            pepper:     { label: 'Pepper',     color: '#27ae60', shape: (cx, cy) => polyNgon(cx, cy, 80, 6),        draw: drawTexPepper },
            chocolate:  { label: 'Chocolate',  color: '#6b4226', shape: (cx, cy) => polyRect(cx, cy, 150, 170),     draw: drawTexChocolate },
            avocado:    { label: 'Avocado',    color: '#87a96b', shape: (cx, cy) => polyEllipse(cx, cy, 60, 90),    draw: drawTexAvocado },
            egg:        { label: 'Egg',        color: '#fafafa', shape: (cx, cy) => polyEllipse(cx, cy, 75, 90),    draw: drawTexEgg }
